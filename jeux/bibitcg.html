/* ─── PATCH CHATGPT 01/05/2026 : sauvegarde + recommencer depuis le menu principal ─── */
(function(){
  function normaliseImportedSave(imported){
    if(!imported || typeof imported !== 'object') throw new Error('Sauvegarde invalide');
    const rawState = imported.state && typeof imported.state === 'object' ? imported.state : imported;
    return {
      ...defaultState(),
      ...rawState,
      ownedCards: rawState.ownedCards || {},
      activeTeam: Array.isArray(rawState.activeTeam) ? rawState.activeTeam : [],
      defeatedBosses: Array.isArray(rawState.defeatedBosses) ? rawState.defeatedBosses : [],
      cardCooldowns: rawState.cardCooldowns || {},
      unlockedCollections: Array.isArray(rawState.unlockedCollections) ? rawState.unlockedCollections : [],
      seenCards: Array.isArray(rawState.seenCards) ? rawState.seenCards : [],
      teamBattleTeams: Array.isArray(rawState.teamBattleTeams) ? rawState.teamBattleTeams : []
    };
  }

  function manualSaveGame(){
    ensureSeenCards?.();
    saveState();
    toast('Partie sauvegardée sur ce navigateur.');
  }

  function downloadSaveGame(){
    manualSaveGame();
    const payload = {
      game: 'Boss Cards — TCG Ultime',
      version: 1,
      exportedAt: new Date().toISOString(),
      state
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `boss-cards-sauvegarde-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('Fichier de sauvegarde téléchargé.');
  }

  function uploadSaveGame(){
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.addEventListener('change', () => {
      const file = input.files?.[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = normaliseImportedSave(JSON.parse(String(reader.result || '{}')));
          showModal('📥 Charger cette sauvegarde ?', 'Cela remplacera la progression actuelle par le fichier sélectionné.', [
            { label:'Charger', action:()=>{
              state = imported;
              saveState();
              closeModal();
              setView('home');
              toast('Sauvegarde chargée.');
            }},
            { label:'Annuler', secondary:true, action:closeModal }
          ]);
        } catch(err) {
          toast('Impossible de charger ce fichier de sauvegarde.');
        }
      };
      reader.readAsText(file);
    });
    input.click();
  }

  function restartGameFromHome(){
    showModal('🔄 Recommencer la partie ?', 'Cela remet à zéro toutes les cartes, boss, ressources, équipes et améliorations de cette sauvegarde.', [
      { label:'Oui, recommencer', action:()=>{
        state = defaultState();
        saveState();
        closeModal();
        setView('home');
        toast('Nouvelle partie lancée.');
      }},
      { label:'Annuler', secondary:true, action:closeModal }
    ]);
  }

  function addSaveMenuButtons(){
    const groups = document.querySelector('.home-action-groups');
    if(!groups || document.getElementById('homeSaveGroup')) return;
    groups.insertAdjacentHTML('beforeend', `
      <div class="home-action-group" id="homeSaveGroup">
        <div class="home-action-title">Sauvegarde</div>
        <div class="home-action-buttons home-all-buttons">
          <button class="btn btn-primary" id="manualSaveGameBtn">💾 Sauvegarder</button>
          <button class="btn btn-secondary" id="downloadSaveGameBtn">📤 Télécharger la sauvegarde</button>
          <button class="btn btn-secondary" id="uploadSaveGameBtn">📥 Charger une sauvegarde</button>
          <button class="btn btn-danger" id="restartGameBtn">🔄 Recommencer</button>
        </div>
        <div class="stat-sub" style="margin-top:10px;text-align:center;">La progression est aussi enregistrée automatiquement dans ce navigateur.</div>
      </div>`);
    document.getElementById('manualSaveGameBtn')?.addEventListener('click', manualSaveGame);
    document.getElementById('downloadSaveGameBtn')?.addEventListener('click', downloadSaveGame);
    document.getElementById('uploadSaveGameBtn')?.addEventListener('click', uploadSaveGame);
    document.getElementById('restartGameBtn')?.addEventListener('click', restartGameFromHome);
  }

  const previousRenderHomeSavePatch = renderHome;
  renderHome = function(){
    previousRenderHomeSavePatch?.();
    addSaveMenuButtons();
  };

  window.manualSaveGame = manualSaveGame;
  window.downloadSaveGame = downloadSaveGame;
  window.uploadSaveGame = uploadSaveGame;
  window.restartGameFromHome = restartGameFromHome;
})();

/* ─── PATCH CHATGPT 02/05/2026 : verrouillage réel du Colysée ─── */
(function(){
  const COLISEE_VIEW_LOCK = 'colisee';
  const COLISEE_UNLOCK_DEFAULT = {
    view: COLISEE_VIEW_LOCK,
    level: 45,
    icon: '🏛',
    name: 'Colysée',
    desc: 'Arène bonus 5v5 avec équipes adverses puissantes.'
  };

  function ensureColiseeUnlockRegistered(){
    if(!Array.isArray(window.SECTION_UNLOCKS) && typeof SECTION_UNLOCKS === 'undefined') return;
    const list = Array.isArray(window.SECTION_UNLOCKS) ? window.SECTION_UNLOCKS : SECTION_UNLOCKS;
    if(!list.some(u => u.view === COLISEE_VIEW_LOCK)){
      list.push({...COLISEE_UNLOCK_DEFAULT});
      list.sort((a,b)=>(Number(a.level||999)-Number(b.level||999)));
    }
  }

  function getColiseeUnlockInfo(){
    ensureColiseeUnlockRegistered();
    if(typeof unlockInfo === 'function') return unlockInfo(COLISEE_VIEW_LOCK) || COLISEE_UNLOCK_DEFAULT;
    return COLISEE_UNLOCK_DEFAULT;
  }

  function isColiseeUnlocked(){
    ensureColiseeUnlockRegistered();
    return typeof isViewUnlocked !== 'function' || isViewUnlocked(COLISEE_VIEW_LOCK);
  }

  function showColiseeLockedMessage(){
    const info = getColiseeUnlockInfo();
    const score = typeof progressScore === 'function' ? progressScore() : 0;
    const missing = typeof scoreToNextLevel === 'function' ? scoreToNextLevel() : 0;
    showModal(
      '🔒 Section verrouillée',
      `${info.icon} ${info.name} se débloque au niveau ${info.level}. Score actuel : ${score} — encore ${missing} points pour le niveau suivant.`,
      [{ label:'Retour accueil', action:()=>{ closeModal(); setView('home'); } }]
    );
    if(typeof updateNavLocks === 'function') updateNavLocks();
  }

  const previousSetViewColiseeLock = setView;
  setView = function(view){
    ensureColiseeUnlockRegistered();
    if(view === COLISEE_VIEW_LOCK && !isColiseeUnlocked()){
      showColiseeLockedMessage();
      return;
    }
    return previousSetViewColiseeLock(view);
  };

  const previousRenderColiseeLobbyLock = window.renderColiseeLobby;
  if(typeof previousRenderColiseeLobbyLock === 'function'){
    window.renderColiseeLobby = function(){
      ensureColiseeUnlockRegistered();
      if(!isColiseeUnlocked()){
        showColiseeLockedMessage();
        return;
      }
      return previousRenderColiseeLobbyLock();
    };
  }

  const previousStartColiseeBattleLock = window.startColiseeBattle;
  if(typeof previousStartColiseeBattleLock === 'function'){
    window.startColiseeBattle = function(...args){
      if(!isColiseeUnlocked()){
        showColiseeLockedMessage();
        return;
      }
      return previousStartColiseeBattleLock.apply(this,args);
    };
  }

  ensureColiseeUnlockRegistered();
})();

/* Boot */
ensureSeenCards();
saveState();
checkCollectionUnlocks();
setInterval(()=>{ cleanExpiredCooldowns(); renderSidebar(); if(currentView==="teamBattle"&&!currentBattle) renderTeamBattleLobby(); if(currentView==="colisee"&&!currentBattle&&window.renderColiseeLobby) renderColiseeLobby(); }, 1000);
setView("home");
</script>

})();
