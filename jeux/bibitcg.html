<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bibi.TCG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:ital,wght@0,100..900;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg-deep: #03000d;
      --bg-mid: #08031a;
      --bg-surface: #100828;
      --gold: #f5c842;
      --gold-bright: #ffe066;
      --gold-dark: #b8860b;
      --pink: #ff3dcd;
      --pink-dim: #c0007a;
      --cyan: #00f0ff;
      --cyan-dim: #007a9e;
      --green: #39ff9a;
      --red: #ff2d5a;
      --purple: #9b30ff;
      --white: #f0eeff;
      --muted: #8a7fb8;
      --card-w: 175px;
      --card-h: 260px;
      --border-glow: rgba(245,200,66,.25);
      --holo-1: #ff3dcd;
      --holo-2: #00f0ff;
      --holo-3: #f5c842;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: 'Rajdhani', 'Exo 2', sans-serif;
      color: var(--white);
      background: var(--bg-deep);
      cursor: default;
    }

    /* ─── CUSTOM CURSOR ─────────────────────────────────────── */
    .cursor { display:none !important;
      position: fixed; width: 20px; height: 20px;
      border: 2px solid var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform .08s, width .12s, height .12s, background .12s;
      mix-blend-mode: screen;
    }
    .cursor.hovering { width: 40px; height: 40px; background: rgba(245,200,66,.15); }
    .cursor-dot { display:none !important;
      position: fixed; width: 5px; height: 5px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
    }

    /* ─── PARTICLE CANVAS ─────────────────────────────────── */
    #particleCanvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      opacity: .55;
    }

    /* ─── BACKGROUND LAYERS ─────────────────────────────────── */
    .bg-aurora {
      position: fixed; inset: -60%;
      background: conic-gradient(
        from 0deg at 50% 50%,
        transparent 0deg, rgba(155,48,255,.12) 40deg,
        transparent 80deg, rgba(0,240,255,.09) 140deg,
        transparent 180deg, rgba(255,61,205,.11) 230deg,
        transparent 280deg, rgba(245,200,66,.08) 330deg,
        transparent 360deg
      );
      filter: blur(80px);
      animation: auroraSpin 28s linear infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes auroraSpin { to { transform: rotate(360deg); } }

    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,240,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
      animation: gridScroll 25s linear infinite;
    }
    @keyframes gridScroll { to { background-position: 60px 60px; } }

    .bg-vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 40%, var(--bg-deep) 90%);
    }

    /* ─── HOLOGRAPHIC SHIMMER (global) ─────────────────────── */
    @keyframes holoShimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ─── APP WRAPPER ──────────────────────────────────────── */
    .app {
      position: relative; z-index: 2;
      width: min(1560px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 60px;
    }

    /* ─── HEADER ───────────────────────────────────────────── */
    .site-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 24px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(245,200,66,.15);
      position: relative;
    }
    .site-header::after {
      content: ''; position: absolute; bottom: -1px; left: 0;
      width: 40%; height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .logo-block { display: flex; flex-direction: column; gap: 6px; }

    .logo-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: .7rem; letter-spacing: .35em;
      color: var(--gold); text-transform: uppercase;
      opacity: .8;
    }

    .logo-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 5vw, 5rem);
      font-weight: 900;
      line-height: .88;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 35%, var(--pink) 65%, var(--cyan) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: holoShimmer 5s ease infinite;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(245,200,66,.4));
    }

    .logo-subtitle {
      font-family: 'Exo 2', sans-serif;
      color: var(--muted); margin-top: 8px;
      max-width: 700px; line-height: 1.5;
      font-size: .95rem; font-style: italic;
    }

    /* ─── PILLS / RULES ─────────────────────────────────────── */
    .rules { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

    .rule-pill {
      display: flex; align-items: center; gap: 7px;
      border: 1px solid rgba(245,200,66,.2);
      background: rgba(245,200,66,.06);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 8px 14px;
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
      transition: border-color .2s, background .2s;
    }
    .rule-pill:hover { border-color: rgba(245,200,66,.5); background: rgba(245,200,66,.1); }
    .rule-pill strong { color: var(--gold-bright); }
    .rule-pill .pill-icon { font-size: .85rem; }



    /* ─── MODE VISUEL ÉPURÉ ─────────────────────────────────── */
    .logo-subtitle,
    .rules,
    .nav-view-hint,
    .sidebar-hint,
    .hero-desc {
      display: none !important;
    }

    .site-header {
      margin-bottom: 18px;
      padding-bottom: 18px;
    }

    /* ─── MAIN LAYOUT ───────────────────────────────────────── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    /* ─── PANEL ────────────────────────────────────────────── */
    .panel {
      position: relative;
      border: 1px solid rgba(245,200,66,.15);
      background: linear-gradient(160deg,
        rgba(16,8,40,.9) 0%,
        rgba(8,3,26,.95) 100%
      );
      backdrop-filter: blur(24px);
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(0,240,255,.04),
        0 32px 80px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(255,255,255,.06);
      overflow: hidden;
    }
    .panel::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,200,66,.4), rgba(255,61,205,.3), transparent);
    }

    .arena { min-height: 820px; padding: 24px; }
    .sidebar-panel { padding: 22px; position: sticky; top: 20px; }

    /* ─── NAV BAR ───────────────────────────────────────────── */
    .nav-bar {
      display: flex; justify-content: space-between;
      align-items: center; gap: 14px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .nav-info {}
    .nav-view-title {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem; font-weight: 700;
      color: var(--white); letter-spacing: .04em;
    }
    .nav-view-hint {
      font-size: .85rem; color: var(--muted);
      margin-top: 3px; font-style: italic;
    }

    .nav-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ─── BUTTONS ───────────────────────────────────────────── */
    .btn {
      position: relative; overflow: hidden;
      border: none;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      border-radius: 12px;
      padding: 11px 18px;
      cursor: pointer;
      transition: transform .18s, filter .18s, box-shadow .18s;
      color: #0a0416;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.25) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn::after {
      content: ''; position: absolute;
      top: -100%; left: -60%;
      width: 40%; height: 300%;
      background: rgba(255,255,255,.4);
      transform: skewX(-20deg);
      transition: left .4s ease;
      pointer-events: none;
    }
    .btn:hover::after { left: 160%; }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.03);
      filter: saturate(1.3) brightness(1.1);
    }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn:disabled { cursor: not-allowed; opacity: .35; filter: grayscale(.6); }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, #ffb347 40%, var(--pink) 80%);
      box-shadow: 0 8px 28px rgba(245,200,66,.3), 0 0 0 1px rgba(245,200,66,.2);
    }
    .btn-secondary {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.14);
      color: var(--white);
      box-shadow: none;
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,.13); }

    .btn-cyan {
      background: linear-gradient(135deg, var(--cyan) 0%, #00a8e8 60%, var(--purple) 100%);
      box-shadow: 0 8px 28px rgba(0,240,255,.25);
    }
    .btn-danger {
      background: linear-gradient(135deg, var(--red) 0%, #ff6b6b 100%);
      box-shadow: 0 8px 24px rgba(255,45,90,.3);
      color: white;
    }
    .btn-sm { padding: 8px 12px; font-size: .68rem; border-radius: 9px; }
    .btn-full { width: 100%; text-align: center; margin-top: 10px; }

    /* ─── BATTLE ZONE ───────────────────────────────────────── */
    .battle-zone {
      min-height: 720px;
      position: relative;
      border-radius: 22px;
      background: radial-gradient(ellipse at center top, rgba(155,48,255,.06), transparent 40%);
      border: 1px solid rgba(255,255,255,.05);
      overflow: hidden;
    }
    .battle-content { position: relative; z-index: 2; padding: 24px; min-height: 720px; }

    /* ─── HOME / HERO SECTION ───────────────────────────────── */
    .hero-section {
      padding: 32px;
      border-radius: 22px;
      background: linear-gradient(
        135deg,
        rgba(155,48,255,.1) 0%,
        rgba(245,200,66,.08) 35%,
        rgba(0,240,255,.06) 70%,
        rgba(255,61,205,.08) 100%
      );
      border: 1px solid rgba(245,200,66,.15);
      position: relative;
      overflow: hidden;
    }
    .hero-section::before {
      content: '';
      position: absolute; top: -50%; right: -20%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(245,200,66,.12), transparent 60%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 4vw, 3.8rem);
      font-weight: 900;
      line-height: .88;
      letter-spacing: -.02em;
      text-transform: uppercase;
      margin-bottom: 14px;
      background: linear-gradient(135deg, var(--white) 30%, var(--gold) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-desc {
      color: var(--muted); font-size: .95rem;
      line-height: 1.6; max-width: 650px;
      font-style: italic;
    }

    /* ─── STAT DASHBOARD ───────────────────────────────────── */
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 14px;
      margin: 20px 0;
    }
    .stat-card {
      padding: 18px 16px;
      border-radius: 18px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.07);
      position: relative;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }
    .stat-card:hover {
      border-color: rgba(245,200,66,.25);
      transform: translateY(-2px);
    }
    .stat-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: var(--stat-accent, linear-gradient(90deg, var(--gold), transparent));
    }
    .stat-label {
      font-family: 'Cinzel', serif;
      font-size: .62rem; letter-spacing: .16em;
      text-transform: uppercase; color: var(--muted);
      display: block; margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2.1rem; font-weight: 900;
      color: var(--gold-bright);
      display: block; line-height: 1;
      text-shadow: 0 0 20px rgba(245,200,66,.4);
    }
    .stat-sub { font-size: .72rem; color: var(--muted); margin-top: 4px; }

    /* ─── CARDS ────────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .tcg-card {
      height: 260px;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
      background: #0c0720;
      box-shadow: 0 16px 40px rgba(0,0,0,.5);
      isolation: isolate;
      cursor: pointer;
      transition: transform .3s cubic-bezier(.2,1.1,.4,1), box-shadow .3s;
    }
    .tcg-card:hover {
      transform: translateY(-12px) scale(1.04) rotateX(4deg);
      box-shadow:
        0 28px 60px rgba(0,0,0,.6),
        0 0 30px var(--card-glow, rgba(245,200,66,.25));
    }

    /* holographic overlay */
    .tcg-card::after {
      content: '';
      position: absolute; inset: 0; border-radius: 20px;
      background: linear-gradient(
        105deg,
        transparent 20%,
        rgba(245,200,66,.08) 35%,
        rgba(0,240,255,.12) 50%,
        rgba(255,61,205,.08) 65%,
        transparent 80%
      );
      background-size: 200% 200%;
      opacity: 0;
      transition: opacity .3s;
      z-index: 5;
      pointer-events: none;
    }
    .tcg-card:hover::after { opacity: 1; animation: holoShimmer .8s linear; }

    .card-img {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center top;
      z-index: 0;
      transition: transform .4s ease;
    }
    .tcg-card:hover .card-img { transform: scale(1.06); }

    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        180deg,
        transparent 30%,
        rgba(3,0,13,.5) 55%,
        rgba(3,0,13,.92) 100%
      );
      z-index: 1;
    }
    /* Top shine */
    .card-shine {
      position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(circle at 30% 0%, rgba(255,255,255,.25), transparent 50%);
      pointer-events: none;
    }

    .card-content-inner {
      position: absolute; inset: 0; z-index: 3;
      display: flex; flex-direction: column;
      justify-content: flex-end; gap: 6px;
      padding: 12px;
    }

    .rarity-badge {
      align-self: flex-start;
      padding: 4px 10px;
      border-radius: 999px;
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      border: 1px solid transparent;
      backdrop-filter: blur(8px);
    }
    .rarity-t1 { background: rgba(0,0,0,.5); border-color: rgba(255,255,255,.2); color: #ccc; }
    .rarity-t2 { background: rgba(57,255,154,.12); border-color: rgba(57,255,154,.3); color: #7fffb8; box-shadow: 0 0 10px rgba(57,255,154,.2); }
    .rarity-t3 { background: rgba(0,240,255,.12); border-color: rgba(0,240,255,.3); color: #88f8ff; box-shadow: 0 0 12px rgba(0,240,255,.2); }
    .rarity-t4 { background: rgba(155,48,255,.15); border-color: rgba(155,48,255,.35); color: #d0a0ff; box-shadow: 0 0 14px rgba(155,48,255,.25); }
    .rarity-t5 { background: rgba(245,200,66,.15); border-color: rgba(245,200,66,.4); color: #ffe080; box-shadow: 0 0 16px rgba(245,200,66,.3); }
    .rarity-t6 {
      background: linear-gradient(135deg, rgba(245,200,66,.15), rgba(255,61,205,.15));
      border-color: rgba(245,200,66,.5);
      color: #ffe066;
      box-shadow: 0 0 20px rgba(245,200,66,.35), 0 0 40px rgba(255,61,205,.15);
      animation: legendaryPulse 2s ease-in-out infinite;
    }
    @keyframes legendaryPulse {
      50% { box-shadow: 0 0 30px rgba(245,200,66,.5), 0 0 60px rgba(255,61,205,.2); }
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: .85rem; font-weight: 700;
      line-height: 1.1;
      text-shadow: 0 2px 12px rgba(0,0,0,.9);
      color: var(--white);
    }

    .card-power {
      align-self: flex-start;
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), #ffb347);
      color: #0a0416;
      font-family: 'Cinzel Decorative', serif;
      font-size: .88rem;
      font-weight: 900;
      box-shadow: 0 4px 16px rgba(245,200,66,.35);
    }
    .card-power .power-icon { font-size: .8rem; }

    .card-dupe { color: var(--cyan); font-size: .72rem; font-weight: 600; }
    .card-bonus { color: var(--green); font-weight: 700; }
    .card-missing {
      align-self: flex-start;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(0,0,0,.55);
      border: 1px dashed rgba(255,255,255,.25);
      color: var(--muted); font-size: .65rem;
      font-family: 'Cinzel', serif; letter-spacing: .06em;
      text-transform: uppercase;
    }

    .card-actions-row { display: flex; gap: 6px; flex-wrap: wrap; }

    .tcg-card.not-owned {
      filter: grayscale(.9);
      opacity: .52;
    }
    .tcg-card.not-owned .card-img { filter: grayscale(1) brightness(.42) contrast(1.12); }
    .tcg-card.in-team {
      outline: 2px solid rgba(57,255,154,.6);
      box-shadow: 0 0 0 1px rgba(57,255,154,.3), 0 18px 45px rgba(0,0,0,.5), 0 0 25px rgba(57,255,154,.2);
    }

    /* ─── CHOICE / PACK ─────────────────────────────────────── */
    .choice-wrap {
      min-height: 680px;
      display: grid; place-items: center;
      text-align: center;
    }
    .choice-inner { max-width: 600px; }
    .choice-title-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 5vw, 3.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-bright), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: .9; margin-bottom: 10px;
    }
    .pack-progress-bar-wrap {
      margin: 14px auto; max-width: 280px;
      height: 4px; background: rgba(255,255,255,.08);
      border-radius: 2px; overflow: hidden;
    }
    .pack-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--pink));
      border-radius: 2px;
      transition: width .4s ease;
      box-shadow: 0 0 12px rgba(245,200,66,.5);
    }

    .choice-row {
      display: flex; justify-content: center;
      align-items: center; gap: 40px; flex-wrap: wrap;
      margin-top: 28px;
    }
    .choice-card {
      width: var(--card-w); height: var(--card-h);
      cursor: pointer;
      animation: cardReveal .55s cubic-bezier(.18,1.25,.32,1) both;
    }
    .choice-card:nth-child(1) { animation-delay: .05s; }
    .choice-card:nth-child(3) { animation-delay: .18s; }
    @keyframes cardReveal {
      from { transform: translateY(40px) scale(.75) rotateY(90deg); opacity: 0; filter: blur(8px); }
      to   { transform: translateY(0) scale(1) rotateY(0deg); opacity: 1; filter: blur(0); }
    }
    .vs-orb {
      width: 60px; height: 60px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,200,66,.3), rgba(255,61,205,.2));
      border: 2px solid var(--gold);
      display: grid; place-items: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: .9rem; font-weight: 900; color: var(--gold);
      box-shadow: 0 0 30px rgba(245,200,66,.3), 0 0 60px rgba(255,61,205,.15);
      animation: vsOrbPulse 1.8s ease-in-out infinite;
    }
    @keyframes vsOrbPulse {
      50% { box-shadow: 0 0 50px rgba(245,200,66,.5), 0 0 100px rgba(255,61,205,.25); transform: scale(1.06); }
    }

    /* ─── BOSS LIST ─────────────────────────────────────────── */
    .boss-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }
    .boss-mini-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.08);
      transition: border-color .2s, transform .2s, box-shadow .2s;
      position: relative; overflow: hidden;
    }
    .boss-mini-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--boss-glow-color, var(--gold));
      opacity: .6;
    }
    .boss-mini-card:hover {
      border-color: rgba(245,200,66,.25);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,.3);
    }
    .boss-mini-card.pass { border-color: rgba(57,255,154,.3); box-shadow: 0 0 20px rgba(57,255,154,.08); }
    .boss-mini-card.done { border-color: rgba(245,200,66,.4); box-shadow: 0 0 20px rgba(245,200,66,.1); }
    .boss-mini-card.fail { opacity: .7; }

    .boss-mini-name {
      font-family: 'Cinzel', serif;
      font-size: .95rem; font-weight: 700;
      color: var(--white); margin-bottom: 6px;
    }
    .boss-mini-power {
      font-size: .78rem; color: var(--muted); margin-bottom: 8px;
    }
    .boss-mini-power strong { color: var(--gold); }
    .boss-mini-status {
      font-size: .72rem; font-style: italic; color: var(--muted); margin-bottom: 10px;
    }
    .boss-mini-card.done .boss-mini-status { color: var(--gold); }
    .boss-mini-card.pass .boss-mini-status { color: var(--green); }

    /* ─── BATTLE SCENE ──────────────────────────────────────── */
    .battle-scene {
      min-height: 680px;
      display: grid; grid-template-rows: auto 1fr auto;
      gap: 20px;
      position: relative; overflow: hidden;
      border-radius: 22px;
      padding: 22px;
      background: radial-gradient(ellipse at 50% 20%, rgba(245,200,66,.1), transparent 40%),
                  radial-gradient(ellipse at 20% 80%, rgba(0,240,255,.08), transparent 35%),
                  linear-gradient(135deg, rgba(0,0,0,.4), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
    }
    .battle-scene > * { position: relative; z-index: 2; }

    /* Battle aura */
    .battle-scene::before {
      content: '';
      position: absolute; inset: -60%;
      background: conic-gradient(
        transparent, var(--boss-glow, #ff3dcd),
        transparent, var(--boss-accent, #f5c842), transparent
      );
      mix-blend-mode: screen; opacity: .2;
      animation: battleAura 4s linear infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes battleAura { to { transform: rotate(360deg); } }

    .battle-header { text-align: center; }
    .battle-boss-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 5vw, 4.5rem);
      font-weight: 900;
      line-height: .85;
      text-transform: uppercase;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--white), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px var(--boss-glow, #ff3dcd));
    }
    .battle-score-line {
      margin-top: 8px; color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: .85rem; letter-spacing: .1em;
    }

    .battle-field {
      display: grid;
      grid-template-columns: 1fr minmax(200px, 340px);
      gap: 24px;
      align-items: center;
    }

    /* Team cards in battle */
    .battle-team {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center; align-content: center;
      min-height: 280px;
    }
    .team-battle-card {
      width: 105px; height: 154px;
      border-radius: 16px; overflow: hidden; position: relative;
      border: 1px solid rgba(255,255,255,.22);
      background: #0c0720;
      box-shadow: 0 14px 35px rgba(0,0,0,.5);
      animation: teamCardEnter .6s cubic-bezier(.2,1.2,.3,1) both;
    }
    .team-battle-card:nth-child(1) { animation-delay: .05s; }
    .team-battle-card:nth-child(2) { animation-delay: .12s; }
    .team-battle-card:nth-child(3) { animation-delay: .19s; }
    .team-battle-card:nth-child(4) { animation-delay: .26s; }
    .team-battle-card:nth-child(5) { animation-delay: .33s; }
    @keyframes teamCardEnter {
      from { transform: translateX(-70px) rotate(-12deg) scale(.7); opacity: 0; filter: blur(6px); }
      to   { transform: translateX(0) rotate(var(--tilt, 0deg)); opacity: 1; filter: blur(0); }
    }
    .team-battle-card .card-img { position: absolute; inset: 0; background-size: cover; background-position: center top; }
    .team-battle-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,.85));
    }
    .team-battle-info {
      position: absolute; bottom: 7px; left: 7px; right: 7px; z-index: 2;
    }
    .team-battle-name {
      font-family: 'Cinzel', serif;
      font-size: .6rem; font-weight: 700; line-height: 1;
      text-shadow: 0 2px 8px #000;
    }
    .team-battle-pts {
      display: inline-block; margin-top: 4px;
      padding: 3px 7px; border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), #ffb347);
      color: #0a0416; font-size: .68rem; font-weight: 900;
      font-family: 'Cinzel Decorative', serif;
    }

    /* Boss battle card */
    .boss-battle-card {
      height: min(500px, 60vh); min-height: 380px;
      border-radius: 28px; position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
      box-shadow:
        0 40px 100px rgba(0,0,0,.7),
        0 0 80px var(--boss-glow, #ff3dcd),
        inset 0 1px 0 rgba(255,255,255,.15);
      background: #08051a;
      animation: bossEnter .9s cubic-bezier(.15,1.2,.3,1) .3s both, bossFloat 3.5s ease-in-out 1.2s infinite;
    }
    .boss-battle-img {
      position: absolute; inset: 0;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #050312;
      z-index: 0;
    }
    .boss-battle-card::before {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,.18), transparent 32%),
        linear-gradient(180deg, transparent 40%, rgba(0,0,0,.82));
    }
    /* Rotating boss holo border */
    .boss-battle-card::after {
      content: ''; position: absolute; inset: -50%; z-index: 2;
      background: conic-gradient(
        transparent, var(--boss-glow, #ff3dcd),
        transparent 40%, var(--boss-accent, #f5c842),
        transparent 80%
      );
      mix-blend-mode: screen; opacity: .3;
      animation: battleAura 3.5s linear infinite;
    }
    .boss-battle-info {
      position: absolute; bottom: 18px; left: 18px; right: 18px; z-index: 3;
    }
    .boss-battle-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.8rem);
      line-height: .85; font-weight: 900;
      text-transform: uppercase; letter-spacing: -.02em;
      text-shadow: 0 0 30px var(--boss-glow, #ff3dcd), 0 4px 20px #000;
    }
    .boss-battle-power {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 8px 14px; border-radius: 999px;
      background: linear-gradient(135deg, var(--boss-accent, #f5c842), var(--boss-glow, #ff3dcd));
      color: #0a0416; font-weight: 900;
      font-family: 'Cinzel Decorative', serif; font-size: .9rem;
    }
    @keyframes bossEnter {
      from { transform: translateX(80px) scale(.78); opacity: 0; filter: blur(14px); }
      to   { transform: translateX(0) scale(1); opacity: 1; filter: blur(0); }
    }
    @keyframes bossFloat { 50% { transform: translateY(-12px); } }

    /* ─── ATTACK ANIMATIONS ─────────────────────────────────── */
    .attack-layer { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

    .attack-orb {
      position: absolute; left: 22%; top: 46%;
      width: 38px; height: 38px; border-radius: 50%;
      background: radial-gradient(circle, white, var(--cyan), var(--gold));
      box-shadow: 0 0 30px var(--cyan), 0 0 80px var(--gold);
      opacity: 0;
      animation: atkOrb 1.4s ease-in-out 1s forwards;
    }
    @keyframes atkOrb {
      0%   { transform: translate(0,0) scale(.3); opacity: 0; }
      12%  { opacity: 1; }
      70%  { transform: translate(46vw,-6vh) scale(1.4); opacity: 1; }
      100% { transform: translate(50vw,-8vh) scale(5); opacity: 0; }
    }

    .atk-slash {
      position: absolute; right: 18%; top: 22%;
      width: 220px; height: 8px; border-radius: 999px;
      background: linear-gradient(90deg, transparent, white, var(--gold), transparent);
      box-shadow: 0 0 20px white, 0 0 50px var(--gold);
      opacity: 0; transform: rotate(-30deg);
      animation: slashAnim .65s ease-out 2.1s forwards;
    }
    .atk-slash.s2 { top: 40%; transform: rotate(25deg); animation-delay: 2.25s; }
    .atk-slash.s3 { top: 58%; transform: rotate(-15deg); animation-delay: 2.4s; }
    @keyframes slashAnim {
      0%   { opacity: 0; scale: .4; filter: blur(6px); }
      30%  { opacity: 1; scale: 1.2; filter: blur(0); }
      100% { opacity: 0; scale: 1.5; filter: blur(10px); }
    }

    .impact-flash {
      position: absolute; inset: 0; z-index: 6;
      background: radial-gradient(circle at 72% 44%,
        rgba(255,255,255,.9), rgba(245,200,66,.4) 15%, transparent 40%
      );
      opacity: 0;
      animation: impactFlash .9s ease-out 2.3s forwards;
    }
    @keyframes impactFlash {
      0%,100% { opacity: 0; }
      25%  { opacity: 1; }
    }

    .victory-banner {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%) scale(.6);
      z-index: 8; opacity: 0; text-align: center;
      padding: 28px 36px; border-radius: 28px;
      background: rgba(0,0,0,.7); backdrop-filter: blur(20px);
      border: 1px solid rgba(245,200,66,.35);
      box-shadow: 0 40px 100px rgba(0,0,0,.6), 0 0 60px rgba(245,200,66,.2);
      animation: victoryPop 1.2s cubic-bezier(.15,1.3,.3,1) 2.8s forwards;
    }
    .victory-banner h3 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      line-height: .82;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--gold-bright), var(--gold), var(--pink));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: holoShimmer 2s linear infinite;
    }
    .victory-banner p {
      margin-top: 12px; color: var(--white);
      font-family: 'Cinzel', serif;
      font-size: .85rem; letter-spacing: .06em;
    }
    @keyframes victoryPop {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(.4) rotate(-8deg); filter: blur(14px); }
      60%  { opacity: 1; transform: translate(-50%,-50%) scale(1.1) rotate(2deg); filter: blur(0); }
      100% { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(0); }
    }

    /* Confetti particles */
    .confetti-dot {
      position: absolute; border-radius: 50%;
      animation: confettiFall linear forwards;
      pointer-events: none;
    }
    @keyframes confettiFall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(600px) rotate(720deg); opacity: 0; }
    }

    /* ─── REWARD PREVIEW ─────────────────────────────────────── */
    .reward-bar {
      display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
    }
    .reward-pill {
      padding: 10px 16px; border-radius: 999px;
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(255,255,255,.1);
      font-family: 'Cinzel', serif;
      font-size: .75rem; letter-spacing: .06em;
      color: var(--muted);
    }
    .reward-pill strong { color: var(--gold); }

    /* ─── SIDEBAR ───────────────────────────────────────────── */
    .sidebar-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.15rem; font-weight: 700;
      color: var(--gold);
      margin-bottom: 6px;
      letter-spacing: .02em;
    }
    .sidebar-hint {
      font-size: .82rem; color: var(--muted);
      font-style: italic; margin-bottom: 14px;
      line-height: 1.5;
    }

    .resource-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; border-radius: 14px;
      background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.06);
      margin-bottom: 8px;
    }
    .resource-label {
      font-family: 'Cinzel', serif;
      font-size: .68rem; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
    }
    .resource-value {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.4rem; font-weight: 900;
      color: var(--green);
      text-shadow: 0 0 14px rgba(57,255,154,.4);
    }
    .resource-value.gold-val { color: var(--gold); text-shadow: 0 0 14px rgba(245,200,66,.4); }
    .resource-value.cyan-val { color: var(--cyan); text-shadow: 0 0 14px rgba(0,240,255,.4); }

    .team-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; min-height: 220px; }

    .team-row {
      display: grid; grid-template-columns: 46px 1fr auto;
      align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 14px;
      background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.07);
      transition: border-color .2s;
    }
    .team-row:hover { border-color: rgba(245,200,66,.2); }

    .team-thumb {
      width: 46px; height: 46px; border-radius: 11px;
      background-size: cover; background-position: center top;
      border: 1px solid rgba(255,255,255,.15);
    }
    .team-row-name {
      font-family: 'Cinzel', serif;
      font-size: .78rem; font-weight: 700;
      line-height: 1.2; color: var(--white);
    }
    .team-row-sub { font-size: .68rem; color: var(--muted); margin-top: 2px; }
    .team-row-pts {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem; color: var(--gold);
    }

    .no-team-hint {
      color: var(--muted); font-style: italic;
      font-size: .85rem; text-align: center;
      padding: 20px 0;
    }

    /* ─── MODAL ─────────────────────────────────────────────── */
    .modal {
      position: fixed; inset: 0;
      display: none; place-items: center;
      padding: 24px;
      background: rgba(3,0,13,.85);
      backdrop-filter: blur(22px);
      z-index: 40;
    }
    .modal.active { display: grid; }

    .modal-inner {
      width: min(640px, 100%);
      text-align: center;
      padding: 40px 36px;
      border-radius: 32px;
      border: 1px solid rgba(245,200,66,.2);
      background: linear-gradient(160deg, rgba(20,10,50,.95), rgba(8,3,22,.98));
      box-shadow:
        0 50px 120px rgba(0,0,0,.7),
        0 0 80px rgba(245,200,66,.1),
        inset 0 1px 0 rgba(255,255,255,.08);
      animation: modalSlide .35s cubic-bezier(.2,1.2,.4,1);
    }
    @keyframes modalSlide {
      from { transform: scale(.85) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .modal-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 5vw, 3.8rem);
      line-height: .9;
      background: linear-gradient(135deg, var(--gold-bright), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .modal-text {
      color: var(--muted); font-size: .9rem;
      line-height: 1.6; margin-bottom: 22px;
    }
    .modal-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ─── TOAST ─────────────────────────────────────────────── */
    .toast-stack {
      position: fixed; right: 22px; bottom: 22px;
      z-index: 50; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast-item {
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(8,3,26,.88);
      border: 1px solid rgba(245,200,66,.2);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 30px rgba(0,0,0,.4);
      font-family: 'Cinzel', serif;
      font-size: .78rem; letter-spacing: .04em;
      color: var(--white);
      animation: toastIn .3s ease both;
      max-width: 280px;
    }
    @keyframes toastIn {
      from { transform: translateX(20px) scale(.9); opacity: 0; }
      to   { transform: translateX(0) scale(1); opacity: 1; }
    }

    /* ─── MAP ───────────────────────────────────────────────── */
    #bossMap {
      height: min(720px, 72vh);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.1);
      overflow: hidden;
      background: #08101c;
    }
    .leaflet-container { background: #060d18; }

    .boss-marker {
      width: 72px; height: 72px; border-radius: 50%;
      position: relative; overflow: hidden;
      border: 2.5px solid var(--marker-color, #fff);
      box-shadow: 0 0 0 3px rgba(0,0,0,.25), 0 0 24px var(--marker-color, #fff);
      background: transparent;
    }
    .boss-marker img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      background: transparent;
      transform: scale(1.22);
    }
    .boss-marker::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      box-shadow: inset 0 0 0 2.5px var(--marker-color), inset 0 -6px 12px rgba(0,0,0,.25);
    }
    .boss-marker .status-dot {
      position: absolute; right: 0; bottom: 0;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--marker-color); border: 2px solid #111;
      box-shadow: 0 0 8px var(--marker-color);
    }
    .marker-win  { --marker-color: var(--green); }
    .marker-ready { --marker-color: var(--gold); }
    .marker-locked { --marker-color: var(--red); }

    .boss-popup { min-width: 260px; }
    .boss-popup h3 { margin: 0 0 6px; font-family: 'Cinzel', serif; }
    .boss-popup-img {
      width: 100%; height: 200px; object-fit: contain;
      border-radius: 10px; margin: 8px 0; background: #080812;
      border: 1px solid rgba(0,0,0,.2);
    }

    /* ─── FILTERS ───────────────────────────────────────────── */
    .filters-row {
      display: grid; grid-template-columns: 1fr 180px;
      gap: 12px; margin-top: 14px;
    }
    input, select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.1);
      outline: none;
      background: rgba(0,0,0,.35);
      color: var(--white);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: .9rem;
      font-family: 'Rajdhani', sans-serif;
      transition: border-color .2s;
    }
    input:focus, select:focus { border-color: rgba(245,200,66,.4); }
    select option { background: #0c0720; }

    /* ─── UPGRADE ───────────────────────────────────────────── */
    .upgrade-hint-bar {
      display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0;
    }

    /* ─── SECTION TITLE ─────────────────────────────────────── */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 3px; height: 14px; border-radius: 2px;
      background: var(--gold);
      display: inline-block;
    }



    /* ─── MINI-JEUX / MARCHÉ ─────────────────────────────── */
    .mini-layout { display:grid; grid-template-columns: minmax(260px,360px) 1fr; gap:18px; margin-top:18px; align-items:start; }
    .mini-panel { padding:18px; border-radius:20px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.08); }
    .maze-panel {
      margin-top:18px; padding:18px; border-radius:24px;
      background:radial-gradient(circle at 50% 0%, rgba(0,240,255,.12), transparent 42%), rgba(0,0,0,.30);
      border:1px solid rgba(0,240,255,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      text-align:center;
    }
    #mazeGameCanvas {
      width:min(600px,100%); height:auto; display:block; margin:14px auto;
      background:#050505; border:2px solid rgba(245,200,66,.36); border-radius:18px;
      box-shadow:0 18px 50px rgba(0,0,0,.42), 0 0 28px rgba(0,240,255,.08);
    }
    .maze-info { color:var(--muted); font-size:.92rem; line-height:1.45; margin-top:8px; }
    .maze-hud { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin:12px 0; }
    .maze-pill {
      padding:8px 12px; border-radius:999px; background:rgba(0,0,0,.34);
      border:1px solid rgba(255,255,255,.09); color:var(--white);
      font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.06em;
    }
    #mazeGameMessage { min-height:28px; margin-top:10px; font-family:'Cinzel',serif; font-weight:700; }
    .home-action-groups { display:grid; grid-template-columns:repeat(3,minmax(220px,1fr)); gap:14px; margin-top:18px; }
    .home-action-group { padding:16px; border-radius:20px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.08); }
    .home-action-title { font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.11em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
    .home-action-buttons { display:flex; gap:9px; flex-wrap:wrap; }
    @media (max-width:900px){ .home-action-groups { grid-template-columns:1fr; } }

    @keyframes fishCardReveal { 0%{transform:translateY(120px) scale(.35) rotate(-12deg); opacity:0; filter:blur(8px)} 55%{opacity:1; transform:translateY(-20px) scale(1.06) rotate(3deg); filter:blur(0)} 100%{opacity:1; transform:translateY(0) scale(1) rotate(0)} }

    .progress-pill { display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:999px; background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.08); color:var(--muted); font-family:'Cinzel',serif; font-size:.75rem; }

    /* ─── COLLECTIONS / COMBAT TOUR PAR TOUR / DEV MENU ────── */
    .collection-sets-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin:16px 0 22px; }

    .collection-set-card.complete { border-color:rgba(57,255,154,.35); box-shadow:0 0 22px rgba(57,255,154,.08); }
    .collection-set-name { font-family:'Cinzel',serif; font-weight:800; color:var(--white); margin-bottom:6px; }
    .collection-set-meta { color:var(--muted); font-size:.78rem; line-height:1.35; }
    .collection-progress { height:6px; border-radius:999px; background:rgba(255,255,255,.08); overflow:hidden; margin:10px 0; }
    .collection-progress > span { display:block; height:100%; width:var(--pct,0%); background:linear-gradient(90deg,var(--gold),var(--green)); box-shadow:0 0 12px rgba(57,255,154,.35); }
    .collection-mini-list { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }

    .collection-mini-dot.owned { opacity:1; filter:none; border-color:rgba(245,200,66,.4); }
    .collection-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:4px; }
    .collection-tag { font-size:.58rem; color:var(--cyan); border:1px solid rgba(0,240,255,.22); background:rgba(0,240,255,.06); border-radius:999px; padding:2px 7px; font-family:'Cinzel',serif; letter-spacing:.05em; }
    .cooldown-chip { color:var(--red); font-size:.7rem; font-weight:700; }
    .team-row.healing { opacity:.55; border-color:rgba(255,45,90,.24); }

    .turn-battle-layout { display:grid; grid-template-columns:1.15fr .85fr; gap:20px; align-items:stretch; }
    .combat-panel { padding:18px; border-radius:22px; background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.08); position:relative; overflow:hidden; }
    .hp-wrap { height:16px; background:rgba(255,255,255,.09); border-radius:999px; overflow:hidden; border:1px solid rgba(255,255,255,.08); margin:8px 0 12px; }
    .hp-fill { height:100%; width:var(--hp,100%); background:linear-gradient(90deg,var(--red),var(--gold),var(--green)); box-shadow:0 0 18px rgba(245,200,66,.35); transition:width .35s ease; }
    .combat-card-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(132px,1fr)); gap:10px; }
    .combat-card-btn { text-align:left; min-height:190px; border-radius:18px; border:1px solid rgba(255,255,255,.12); background:#0c0720; overflow:hidden; position:relative; cursor:pointer; color:var(--white); padding:0; }
    .combat-card-btn.dead, .combat-card-btn.healing { cursor:not-allowed; opacity:.45; filter:grayscale(.8); }
    .combat-card-btn:hover:not(.dead):not(.healing) { transform:translateY(-3px); border-color:rgba(245,200,66,.38); }
    .combat-card-img { position:absolute; inset:0; background-size:cover; background-position:center top; }
    .combat-card-info { position:absolute; inset:auto 0 0 0; padding:10px; background:linear-gradient(180deg,transparent,rgba(0,0,0,.92)); z-index:2; }

    .combat-card-stats { margin-top:5px; color:var(--gold); font-family:'Cinzel Decorative',serif; font-size:.82rem; }
    .combat-log { margin-top:12px; padding:12px; min-height:70px; border-radius:16px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.07); color:var(--muted); font-size:.85rem; line-height:1.45; }
    .attack-burst { position:absolute; pointer-events:none; z-index:5; width:calc(48px * var(--scale,1)); height:calc(48px * var(--scale,1)); border-radius:50%; background:radial-gradient(circle,white,var(--cyan),var(--gold),transparent 70%); box-shadow:0 0 calc(30px * var(--scale,1)) var(--cyan),0 0 calc(70px * var(--scale,1)) var(--gold); animation:turnOrb .7s ease-out forwards; }
    .attack-burst.player { left:22%; top:44%; }
    .attack-burst.boss { right:22%; top:38%; background:radial-gradient(circle,white,var(--red),var(--pink),transparent 70%); box-shadow:0 0 calc(30px * var(--scale,1)) var(--red),0 0 calc(70px * var(--scale,1)) var(--pink); animation-name:turnOrbReverse; }
    @keyframes turnOrb { to { transform:translate(42vw,-6vh) scale(2.4); opacity:0; } }
    @keyframes turnOrbReverse { to { transform:translate(-42vw,6vh) scale(2.4); opacity:0; } }
    .power-wave { position:absolute; inset:0; z-index:4; pointer-events:none; background:radial-gradient(circle at var(--x,70%) var(--y,45%), rgba(255,255,255,.9), rgba(245,200,66,.35) calc(7% * var(--scale,1)), transparent calc(22% * var(--scale,1))); animation:waveFade .55s ease-out forwards; }
    @keyframes waveFade { from{opacity:1;filter:blur(0)} to{opacity:0;filter:blur(10px)} }
    @media (max-width:900px){ .turn-battle-layout { grid-template-columns:1fr; } }



    /* ─── TEAM BUILDER ─────────────────────────────────────── */
    .team-builder-panel { margin-top:18px; padding:18px; border-radius:22px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.08); }
    .team-slots-grid { display:grid; grid-template-columns:repeat(5,minmax(120px,1fr)); gap:12px; margin:14px 0 20px; }
    .team-slot { min-height:190px; border-radius:18px; border:1px dashed rgba(245,200,66,.32); background:rgba(0,0,0,.26); display:grid; place-items:center; text-align:center; color:var(--muted); position:relative; overflow:hidden; cursor:pointer; }
    .team-slot.filled { border-style:solid; border-color:rgba(57,255,154,.38); }
    .team-slot-empty { font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; padding:12px; }

    .team-slot::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 35%,rgba(0,0,0,.9)); pointer-events:none; }

    .team-slot-meta { margin-top:4px; color:var(--gold); font-family:'Cinzel Decorative',serif; font-size:.78rem; }
    .team-stock-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; margin-top:14px; }
    .team-stock-card { min-height:225px; border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,.12); background:#0c0720; position:relative; cursor:pointer; box-shadow:0 14px 34px rgba(0,0,0,.42); }
    .team-stock-card:hover:not(.healing) { transform:translateY(-3px); border-color:rgba(245,200,66,.35); }
    .team-stock-card.selected { outline:2px solid rgba(57,255,154,.75); box-shadow:0 0 24px rgba(57,255,154,.18),0 14px 34px rgba(0,0,0,.42); }
    .team-stock-card.healing { opacity:.48; filter:grayscale(1); cursor:not-allowed; }
    .team-stock-img { position:absolute; inset:0; background-size:cover; background-position:center top; }
    .team-stock-card::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.92)); pointer-events:none; }
    .team-stock-info { position:absolute; inset:auto 0 0 0; padding:10px; z-index:2; }
    .team-stock-name { font-family:'Cinzel',serif; font-weight:800; font-size:.72rem; line-height:1.08; }

    .team-stock-collections { margin-top:5px; display:flex; gap:4px; flex-wrap:wrap; }
    .team-stock-collections .collection-tag { font-size:.53rem; }
    .team-summary-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .team-summary-pill { padding:8px 12px; border-radius:999px; background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.08); color:var(--muted); font-family:'Cinzel',serif; font-size:.72rem; }
    .team-summary-pill strong { color:var(--gold); }
    .dupe-badge { position:absolute; top:8px; left:8px; z-index:8; min-width:74px; min-height:46px; padding:6px 10px; border-radius:16px; display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; background:linear-gradient(135deg,var(--cyan),var(--gold),var(--purple)); color:#050312; font-family:'Cinzel Decorative',serif; font-weight:900; font-size:1.08rem; line-height:.9; text-align:center; box-shadow:0 0 24px rgba(0,240,255,.5),0 10px 24px rgba(0,0,0,.42); border:2px solid rgba(255,255,255,.72); }
    .dupe-badge small { font-family:'Cinzel',serif; font-size:.48rem; letter-spacing:.1em; line-height:1; }
    .card-memory-note { color:var(--cyan); font-size:.7rem; font-weight:700; }
    .tcg-card.healing-card { filter:grayscale(1); opacity:.52; }
    .boss-marker.marker-special { --marker-color: var(--pink); box-shadow:0 0 0 3px rgba(0,0,0,.4),0 0 24px var(--pink),0 0 38px rgba(155,48,255,.45); }
    .boss-marker .marker-value { position:absolute; left:50%; bottom:2px; transform:translateX(-50%); z-index:3; padding:1px 6px; border-radius:999px; background:rgba(0,0,0,.45); color:var(--gold-bright); font-family:'Cinzel Decorative',serif; font-size:.58rem; font-weight:900; border:1px solid rgba(245,200,66,.45); line-height:1.2; backdrop-filter:blur(4px); }
    @media (max-width:900px){ .team-slots-grid { grid-template-columns:repeat(2,1fr); } }

    /* ─── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 1100px) {
      .main-layout { grid-template-columns: 1fr; }
      .sidebar-panel { position: relative; top: 0; }
      .dash-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 800px) {
      .battle-field { grid-template-columns: 1fr; }
      .boss-battle-card { min-height: 340px; }
      .site-header { flex-direction: column; }
      :root { --card-w: 148px; --card-h: 228px; }
      .cards-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); }
    }
    @media (max-width: 600px) {
      .app { width: calc(100% - 16px); }
      .arena { padding: 14px; }
      .battle-content { padding: 14px; }
      .choice-row { gap: 20px; }
      .filters-row { grid-template-columns: 1fr; }
    }

    /* ─── LOADING SHIMMER ───────────────────────────────────── */
    @keyframes shimmerLoad {
      from { background-position: -400px 0; }
      to   { background-position: 400px 0; }
    }

    /* Card entrance stagger */
    .cards-grid .tcg-card {
      animation: cardEnterStagger .5s cubic-bezier(.2,1.1,.4,1) both;
    }
    .cards-grid .tcg-card:nth-child(1) { animation-delay: .02s; }
    .cards-grid .tcg-card:nth-child(2) { animation-delay: .05s; }
    .cards-grid .tcg-card:nth-child(3) { animation-delay: .08s; }
    .cards-grid .tcg-card:nth-child(4) { animation-delay: .11s; }
    .cards-grid .tcg-card:nth-child(5) { animation-delay: .14s; }
    .cards-grid .tcg-card:nth-child(6) { animation-delay: .17s; }
    .cards-grid .tcg-card:nth-child(7) { animation-delay: .2s; }
    .cards-grid .tcg-card:nth-child(8) { animation-delay: .23s; }
    @keyframes cardEnterStagger {
      from { transform: translateY(30px) scale(.9); opacity: 0; filter: blur(4px); }
      to   { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
    }



    /* ─── BAR / FAUX DATE ───────────────────────────────────── */
    .bar-scene {
      min-height:640px; display:grid; grid-template-columns:minmax(230px,340px) 1fr; gap:20px; align-items:stretch;
      border-radius:26px; padding:22px; overflow:hidden; position:relative;
      background:radial-gradient(circle at 20% 10%, rgba(255,61,205,.22), transparent 34%), radial-gradient(circle at 82% 18%, rgba(245,200,66,.16), transparent 30%), linear-gradient(135deg, rgba(0,0,0,.36), rgba(80,18,70,.16));
      border:1px solid rgba(255,61,205,.24);
    }
    .bar-character { border-radius:24px; min-height:420px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.10); display:grid; place-items:end center; overflow:hidden; position:relative; }
    .bar-character::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 35%, rgba(255,255,255,.15), transparent 35%); }
    .bar-character img { position:relative; z-index:2; width:100%; height:100%; max-height:560px; object-fit:contain; object-position:center bottom; filter:drop-shadow(0 24px 35px rgba(0,0,0,.55)); }
    .bar-fallback-avatar { position:relative; z-index:2; font-size:8rem; margin:auto; filter:drop-shadow(0 0 30px rgba(255,61,205,.35)); }
    .date-panel { padding:20px; border-radius:24px; background:rgba(0,0,0,.30); border:1px solid rgba(255,255,255,.10); display:flex; flex-direction:column; justify-content:center; }
    .date-question { font-family:'Cinzel Decorative',serif; font-size:clamp(1.55rem,3.6vw,3.2rem); line-height:.95; margin:10px 0 16px; background:linear-gradient(135deg,var(--gold-bright),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .date-answer-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
    .date-answer { min-height:82px; white-space:normal; line-height:1.15; }
    .date-progress { display:flex; gap:7px; flex-wrap:wrap; margin:10px 0 4px; }
    .date-heart { width:30px; height:30px; border-radius:50%; display:grid; place-items:center; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10); color:var(--muted); }
    .date-heart.done { background:rgba(255,61,205,.18); border-color:rgba(255,61,205,.42); color:var(--pink); box-shadow:0 0 14px rgba(255,61,205,.28); }
    .date-meta { color:var(--muted); font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.06em; }
    @media (max-width:900px){ .bar-scene { grid-template-columns:1fr; } .date-answer-row { grid-template-columns:1fr; } }

    /* ─── COMBAT D'ÉQUIPE ──────────────────────────────────── */
    .enemy-team-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; margin-top:18px; }
    .enemy-team-card { padding:14px; border-radius:20px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.09); position:relative; overflow:hidden; }
    .enemy-team-card::before { content:''; position:absolute; inset:0 0 auto 0; height:2px; background:linear-gradient(90deg,var(--red),var(--gold),transparent); opacity:.75; }
    .enemy-team-title { font-family:'Cinzel',serif; color:var(--gold); font-weight:800; margin-bottom:8px; }
    .enemy-mini-cards { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
    .enemy-mini-card { width:48px; height:66px; border-radius:9px; background-size:cover; background-position:center top; border:1px solid rgba(255,255,255,.14); }
    .team-vs-layout { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .team-vs-side { padding:14px; border-radius:20px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.08); }
    .team-vs-side.enemy { border-color:rgba(255,45,90,.18); }
    .combat-card-btn.enemy-target { cursor:default; }
    .combat-card-btn.enemy-target.dead { opacity:.34; }
    @media (max-width:1000px){ .team-vs-layout { grid-template-columns:1fr; } }

    /* ─── CARD TILT (JS driven) ─────────────────────────────── */
    .tcg-card { transform-style: preserve-3d; }

    /* ─── BOUTIQUE PACKS / SKIBIDIFLUX ───────────────────── */
    .shop-hero { display:flex; justify-content:space-between; align-items:center; gap:18px; flex-wrap:wrap; }
    .currency-big {
      display:flex; align-items:center; gap:10px; padding:14px 18px; border-radius:20px;
      background:rgba(0,0,0,.34); border:1px solid rgba(245,200,66,.22);
      box-shadow:0 0 24px rgba(245,200,66,.08);
      font-family:'Cinzel',serif; color:var(--gold);
    }
    .currency-big img { width:44px; height:44px; object-fit:contain; filter:drop-shadow(0 0 12px rgba(245,200,66,.35)); }
    .currency-big strong { font-family:'Cinzel Decorative',serif; font-size:2.2rem; line-height:1; color:var(--gold-bright); }
    .currency-big span { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    .currency-pill { display:inline-flex; align-items:center; gap:7px; color:var(--gold-bright); font-family:'Cinzel',serif; font-weight:800; font-size:.76rem; }
    .currency-pill img { width:24px; height:24px; object-fit:contain; }
    .shop-pack-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top:20px; }
    .shop-pack-card { border-radius:24px; overflow:hidden; background:rgba(0,0,0,.30); border:1px solid rgba(255,255,255,.08); box-shadow:0 18px 46px rgba(0,0,0,.32); }

/* ═══════════════════════════════════════════════════════
   CURSOR
══════════════════════════════════════════════════════════ */
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursorDot');
let mx = -100, my = -100;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursorDot.style.left = mx + 'px';
  cursorDot.style.top  = my + 'px';
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});
document.addEventListener('mouseover', e => {
  if(e.target.matches('button, a, .tcg-card, .choice-card, .boss-mini-card'))
    cursor.classList.add('hovering');
});
document.addEventListener('mouseout', e => {
  if(e.target.matches('button, a, .tcg-card, .choice-card, .boss-mini-card'))
    cursor.classList.remove('hovering');
});

/* ═══════════════════════════════════════════════════════
   PARTICLE SYSTEM
══════════════════════════════════════════════════════════ */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resizeCanvas(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const PARTICLE_COLORS = ['#f5c842','#ff3dcd','#00f0ff','#9b30ff','#39ff9a'];
const particles = [];
for(let i = 0; i < 80; i++){
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.8 + .3,
    vx: (Math.random() - .5) * .35,
    vy: (Math.random() - .5) * .35 - .12,
    alpha: Math.random() * .6 + .1,
    color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: Math.random() * .02 + .008,
  });
}

function animParticles(){
  ctx.clearRect(0, 0, W, H);
  for(const p of particles){
    p.x += p.vx; p.y += p.vy;
    p.pulse += p.pulseSpeed;
    if(p.x < 0) p.x = W; if(p.x > W) p.x = 0;
    if(p.y < 0) p.y = H; if(p.y > H) p.y = 0;
    const a = p.alpha * (.7 + .3 * Math.sin(p.pulse));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    ctx.fill();
    // small glow
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
    grad.addColorStop(0, p.color + '44');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.globalAlpha = a * .4;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(animParticles);
}
animParticles();

/* ═══════════════════════════════════════════════════════
   CARD TILT 3D
══════════════════════════════════════════════════════════ */
document.addEventListener('mousemove', e => {
  document.querySelectorAll('.tcg-card:not(.choice-card)').forEach(card => {
    const r = card.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top  + r.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 200){
      const rx = -(dy / r.height) * 14;
      const ry =  (dx / r.width)  * 14;
      card.style.transform = `perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-10px) scale(1.04)`;
    } else {
      card.style.transform = '';
    }
  });
});

    ownedCards:{}, activeTeam:[], defeatedBosses:[], plusOnes:0,

    cardCooldowns:{}, unlockedCollections:[], seenCards:[], lastFishingAt:0,
    teamBattleTeams:[], teamBattleGeneratedAt:0, lastTeamBattleAt:0, lastLabyrinthAt:0
  };
}
function loadState(){
  try {
    const saved = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(!saved||typeof saved!=="object") return defaultState();
    const hadCurrency = Object.prototype.hasOwnProperty.call(saved,"popopipipapa");
    const starterToConvert = hadCurrency ? 0 : Number(saved.starterPacksRemaining||0);
    return {
      ...defaultState(), ...saved,
      ownedCards:saved.ownedCards||{},
      activeTeam:saved.activeTeam||[],
      defeatedBosses:saved.defeatedBosses||[],
      popopipipapa:Number((hadCurrency ? saved.popopipipapa : defaultState().popopipipapa) || 0) + starterToConvert,
      starterPacksRemaining:0,
      bossWins:Number(saved.bossWins??((saved.defeatedBosses||[]).length||0)),
      cardCooldowns:saved.cardCooldowns||{},
      unlockedCollections:saved.unlockedCollections||[],
      seenCards:[...new Set([...(saved.seenCards||[]), ...Object.keys(saved.ownedCards||{})])],
      lastFishingAt:Number(saved.lastFishingAt||0),
      teamBattleTeams:Array.isArray(saved.teamBattleTeams)?saved.teamBattleTeams:[],
      teamBattleGeneratedAt:Number(saved.teamBattleGeneratedAt||0),
      lastTeamBattleAt:Number(saved.lastTeamBattleAt||0),
      lastLabyrinthAt:Number(saved.lastLabyrinthAt||0)
    };
  } catch { return defaultState(); }
}
function saveState(){ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
function getCard(key){ return CATALOG.find(c => c.key === key); }
function getRarityTier(pts){ return Math.max(1, Math.min(6, Math.ceil(Number(pts||1)/10))); }
function getRarityInfo(card){ const tier=getRarityTier(card.points); return { tier, name:RARITY_NAMES[tier] }; }
function getLuckMultiplier(){ return 1; }
function getCardPackWeight(card){
  const tier=getRarityTier(card.points);
  return RARITY_BASE_WEIGHTS[tier]||0.05;
}
function getBalancedPackPool(pool=PACK_CATALOG){
  const base=(pool||PACK_CATALOG).filter(Boolean);
  if(base.length>=8) return base;

  /* Sécurité anti-pack cadeau :
     un pack avec 1 à 7 cartes rares ne doit plus garantir automatiquement une grosse carte.
     On complète les petits pools avec des cartes communes/peu communes du catalogue. */
  const existing=new Set(base.map(c=>c.key));
  const filler=PACK_CATALOG
    .filter(c=>c && !existing.has(c.key) && getRarityTier(c.points)<=2)
    .slice(0, Math.max(0, 16-base.length));
  return [...base, ...filler];
}
function getOwnedList(){ return Object.values(state.ownedCards).map(o => ({ ...o, card:getCard(o.key) })).filter(x=>x.card); }
function ensureSeenCards(){ state.seenCards=[...new Set([...(state.seenCards||[]), ...Object.keys(state.ownedCards||{})])]; }
function hasSeenCard(key){ ensureSeenCards(); return state.seenCards.includes(key); }
function markSeenCard(key){ state.seenCards=state.seenCards||[]; if(!state.seenCards.includes(key)) state.seenCards.push(key); }
function cleanExpiredCooldowns(){
  const now=Date.now(); let changed=false;
  for(const [key,until] of Object.entries(state.cardCooldowns||{})){
    if(Number(until)<=now){ delete state.cardCooldowns[key]; changed=true; }
  }
  if(changed) saveState();
}
function cooldownRemaining(key){ cleanExpiredCooldowns(); return Math.max(0, Number(state.cardCooldowns?.[key]||0)-Date.now()); }
function isCardHealing(key){ return cooldownRemaining(key)>0; }
function formatCooldown(ms){ return Math.max(1, Math.ceil(ms/1000))+"s"; }
function teamCollectionCounts(teamKeys=state.activeTeam){
  const counts={};
  teamKeys.forEach(key=>{
    const c=getCard(key); if(!c) return;
    (c.collections||[]).forEach(name=>{ counts[name]=(counts[name]||0)+1; });
  });
  return counts;
}
function collectionBonusForKey(key, teamKeys=state.activeTeam){
  const c=getCard(key); if(!c||!teamKeys.includes(key)) return 0;
  const counts=teamCollectionCounts(teamKeys);
  return (c.collections||[]).reduce((sum,name)=>sum+(counts[name]>=2?counts[name]:0),0);
}
function baseCardPower(key){ const o=state.ownedCards[key]; const c=getCard(key); return c?c.points+(o?.upgrade||0):0; }
function finalPoints(key, teamKeys=state.activeTeam){ return baseCardPower(key)+collectionBonusForKey(key,teamKeys); }
function teamScore(){ return state.activeTeam.reduce((s,k)=>s+finalPoints(k,state.activeTeam),0); }
function defeatedSet(){ return new Set(state.defeatedBosses); }
function imgBg(item,idx=0){ return item?.image?`url('${item.image}')`:fallbackBg(idx); }
function fallbackBg(i){ const h=(i*47)%360; return `linear-gradient(135deg,hsl(${h},88%,54%),hsl(${(h+70)%360},92%,62%))`; }
function esc(str){ return String(str).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function collectionCards(name){ return PACK_CATALOG.filter(c=>(c.collections||[]).includes(name)); }
function isCollectionComplete(name){
  const cards=collectionCards(name);
  return cards.length>0 && cards.every(c=>hasSeenCard(c.key));
}
function collectionRewardFor(name){ return COLLECTION_REWARD_CATALOG.find(c=>c.sourceCollection===name); }
function checkCollectionUnlocks(){
  state.unlockedCollections=state.unlockedCollections||[];
  let unlocked=[];
  for(const name of PLAYABLE_COLLECTION_NAMES){
    if(state.unlockedCollections.includes(name)) continue;
    if(isCollectionComplete(name)){
      state.unlockedCollections.push(name);
      const reward=collectionRewardFor(name);
      if(reward && !state.ownedCards[reward.key]){
        state.ownedCards[reward.key]={ key:reward.key, upgrade:0, duplicates:0 };
      }
      unlocked.push(name);
    }
  }
  if(unlocked.length){
    saveState();
    toast(`🏆 Collection terminée : ${unlocked.join(", ")} · carte spéciale débloquée !`);
  }
}
function renderCollectionSets(){
  const sets=PLAYABLE_COLLECTION_NAMES.map(name=>{
    const cards=collectionCards(name);
    const owned=cards.filter(c=>hasSeenCard(c.key)).length;
    const total=cards.length||1;
    const pct=Math.round((owned/total)*100);
    const complete=owned===total;
    const reward=collectionRewardFor(name);
    const rewardText=complete ? `Bonus débloqué : ${reward?.name||"carte spéciale"}` : `Bonus à débloquer : ${reward?.name||"carte spéciale"}`;
    const mini=cards.slice(0,12).map(c=>`<span class="collection-mini-dot ${hasSeenCard(c.key)?'owned':''} ${c?.hsVariant?'hs-variant':''}" title="${esc(c.name)}${hasSeenCard(c.key)?'':' · jamais obtenue'}" style="background:${imgBg(c,c.originalIndex)};background-size:cover;background-position:center top"></span>`).join("");

/* ─── Team management ────────────────────────────────── */
function toggleTeam(key){
  if(!state.ownedCards[key]) return;
  if(!state.activeTeam.includes(key) && isCardHealing(key)){ toast("⏳ Cette carte est en régénération."); return; }
  if(state.activeTeam.includes(key)) state.activeTeam=state.activeTeam.filter(k=>k!==key);
  else {
    if(state.activeTeam.length>=MAX_TEAM_SIZE){ toast("⚠ Équipe complète : 5 cartes max."); return; }
    state.activeTeam.push(key);
  }
  saveState(); renderSidebar();
  if(currentView==="collection") renderCollection();
  else if(currentView==="team") renderTeamBuilder();
  else if(currentView==="upgrade") renderUpgrade();
}
function usePlusOne(key){
  if(state.plusOnes<=0||!state.ownedCards[key]) return;
  state.plusOnes--; state.ownedCards[key].upgrade=(state.ownedCards[key].upgrade||0)+1;
  saveState(); toast("✨ Carte améliorée avec une ressource +1 !"); setView("upgrade");
}
function useDupe(key){
  const o=state.ownedCards[key]; if(!o||o.duplicates<=0) return;
  o.duplicates--; o.upgrade=(o.upgrade||0)+1;
  saveState(); toast("🔥 Doublon fusionné : +1 permanent !"); setView("upgrade");
}
