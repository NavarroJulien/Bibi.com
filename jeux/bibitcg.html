function renderLabyrinth(){
  viewTitle.textContent="Labyrinthe";
  viewHint.textContent="Atteins la sortie avant la fin du temps. Victoire = 1 SKIBIDIFLUX, défaite = aucune pénalité.";
  const remaining = labyrinthRemaining();
  if(remaining > 0){
    content.innerHTML=`
      <div class="hero-section">
        <h2 class="hero-title">Labyrinthe en recharge</h2>
        <div class="maze-info">Le mode Labyrinthe est jouable une fois toutes les 3 minutes. Tu pourras relancer une partie dans <strong>${formatTimer(remaining)}</strong>.</div>
      </div>
      <div class="maze-panel">
        <div class="section-title">Mini-jeu indisponible</div>
        <div class="maze-hud">
          <div class="maze-pill">⏳ Cooldown : <span id="labyrinthCooldownLeft">${formatTimer(remaining)}</span></div>
          <div class="maze-pill">🪙 Récompense : 1 SKIBIDIFLUX</div>
        </div>
        <button class="btn btn-secondary" onclick="setView('home')">Retour accueil</button>
      </div>`;
    const cooldownTimer=setInterval(()=>{
      const left=labyrinthRemaining();
      const el=document.getElementById('labyrinthCooldownLeft');
      if(el) el.textContent=formatTimer(left);
      if(left<=0){ clearInterval(cooldownTimer); if(currentView==='labyrinth') renderLabyrinth(); }
    },1000);
    currentMazeCleanup=()=>clearInterval(cooldownTimer);
    return;
  }
  content.innerHTML=`
    <div class="hero-section">
      <h2 class="hero-title">Labyrinthe mouvant</h2>
      <div class="maze-info">Déplace-toi avec les flèches, ZQSD ou WASD. Le labyrinthe change pendant la partie, mais il garde toujours au moins un chemin possible.</div>
    </div>
    <div class="maze-panel">
      <div class="section-title">Mini-jeu</div>
      <div class="maze-hud">
        <div class="maze-pill">🪙 Récompense : 1 SKIBIDIFLUX</div>
        <div class="maze-pill">⏱ Temps : <span id="mazeTimeLeft">90</span>s</div>
        <div class="maze-pill">🧱 Murs mouvants</div>
      </div>
      <canvas id="mazeGameCanvas" width="600" height="600"></canvas>
      <div id="mazeGameMessage"></div>
      <button class="btn btn-secondary" id="mazeGameRestart">Recommencer</button>
    </div>`;

  const canvas = document.getElementById("mazeGameCanvas");
  const ctx = canvas.getContext("2d");
  const message = document.getElementById("mazeGameMessage");
  const restartButton = document.getElementById("mazeGameRestart");
  const timeLeftEl = document.getElementById("mazeTimeLeft");

  const cols = 15;
  const rows = 15;
  const tileSize = canvas.width / cols;
  const visionRadius = 2.8;
  const wallChangeInterval = 4500;
  const gameDuration = 90;

  let maze = [];
  let player = { x: 0, y: 0 };
  let exit = { x: cols - 1, y: rows - 1 };
  let gameOver = false;
  let wallTimer = null;
  let countdownTimer = null;
  let animationFrame = null;
  let lastWallChangeTime = Date.now();
  let timeLeft = gameDuration;

  function createCell(x, y) {
    return { x, y, visited: false, walls: { top: true, right: true, bottom: true, left: true } };
  }

  function initMaze() {
    const remaining = labyrinthRemaining();
    if(remaining > 0){
      stopTimers();
      message.textContent = `Labyrinthe disponible dans ${formatTimer(remaining)}.`;
      message.style.color = "var(--gold)";
      restartButton.disabled = true;
      restartButton.textContent = `Disponible dans ${formatTimer(remaining)}`;
      const retryTimer = setInterval(()=>{
        const left = labyrinthRemaining();
        restartButton.textContent = left>0 ? `Disponible dans ${formatTimer(left)}` : "Recommencer";
        restartButton.disabled = left>0;
        if(left<=0) clearInterval(retryTimer);
      },1000);
      return;
    }
    state.lastLabyrinthAt = Date.now();
    saveState();
    restartButton.disabled = true;
    restartButton.textContent = "Recommencer dans 3:00";
    setTimeout(()=>{ if(restartButton){ restartButton.disabled=false; restartButton.textContent="Recommencer"; } }, LABYRINTH_COOLDOWN_MS);
    stopTimers();
    maze = [];
    for (let y = 0; y < rows; y++) {
      const row = [];
      for (let x = 0; x < cols; x++) row.push(createCell(x, y));
      maze.push(row);
    }
    generateMaze();
    player = { x: 0, y: 0 };
    exit = findFarthestCellFromStart();
    gameOver = false;
    timeLeft = gameDuration;
    timeLeftEl.textContent = timeLeft;
    message.textContent = "";
    message.style.color = "var(--white)";
    lastWallChangeTime = Date.now();
    wallTimer = setInterval(changeRandomWallsSafely, wallChangeInterval);
    countdownTimer = setInterval(updateCountdown, 1000);
    draw();
  }

  function stopTimers(){
    if(wallTimer) clearInterval(wallTimer);
    if(countdownTimer) clearInterval(countdownTimer);
    if(animationFrame) cancelAnimationFrame(animationFrame);
    wallTimer = null;
    countdownTimer = null;
    animationFrame = null;
  }

  function generateMaze() {
    const stack = [];
    const start = maze[0][0];
    start.visited = true;
    stack.push(start);
    while (stack.length > 0) {
      const current = stack[stack.length - 1];
      const neighbors = getUnvisitedNeighbors(current);
      if (neighbors.length > 0) {
        const next = neighbors[Math.floor(Math.random() * neighbors.length)];
        removeWallBetween(current, next);
        next.visited = true;
        stack.push(next);
      } else stack.pop();
    }
  }

  function getUnvisitedNeighbors(cell) {
    const neighbors = [];
    const { x, y } = cell;
    if (y > 0 && !maze[y - 1][x].visited) neighbors.push(maze[y - 1][x]);
    if (x < cols - 1 && !maze[y][x + 1].visited) neighbors.push(maze[y][x + 1]);
    if (y < rows - 1 && !maze[y + 1][x].visited) neighbors.push(maze[y + 1][x]);
    if (x > 0 && !maze[y][x - 1].visited) neighbors.push(maze[y][x - 1]);
    return neighbors;
  }

  function removeWallBetween(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    if (dx === 1) { a.walls.right = false; b.walls.left = false; }
    else if (dx === -1) { a.walls.left = false; b.walls.right = false; }
    if (dy === 1) { a.walls.bottom = false; b.walls.top = false; }
    else if (dy === -1) { a.walls.top = false; b.walls.bottom = false; }
  }

  function getNeighbor(cell, direction) {
    const { x, y } = cell;
    if (direction === "top" && y > 0) return maze[y - 1][x];
    if (direction === "right" && x < cols - 1) return maze[y][x + 1];
    if (direction === "bottom" && y < rows - 1) return maze[y + 1][x];
    if (direction === "left" && x > 0) return maze[y][x - 1];
    return null;
  }

  function oppositeDirection(direction) {
    return { top:"bottom", right:"left", bottom:"top", left:"right" }[direction];
  }

  function changeRandomWallsSafely() {
    if (gameOver) return;
    let changed = false;
    for (let i = 0; i < 20 && !changed; i++) {
      const x = Math.floor(Math.random() * cols);
      const y = Math.floor(Math.random() * rows);
      const cell = maze[y][x];
      const directions = ["top", "right", "bottom", "left"];
      const direction = directions[Math.floor(Math.random() * directions.length)];
      const neighbor = getNeighbor(cell, direction);
      if (!neighbor) continue;
      const oldWallState = cell.walls[direction];
      const opposite = oppositeDirection(direction);
      cell.walls[direction] = !oldWallState;
      neighbor.walls[opposite] = !oldWallState;
      if (pathExists(player, exit)) {
        changed = true;
        lastWallChangeTime = Date.now();
      } else {
        cell.walls[direction] = oldWallState;
        neighbor.walls[opposite] = oldWallState;
      }
    }
  }

  function pathExists(start, target) {
    const queue = [{ x: start.x, y: start.y }];
    const visited = new Set([start.x + "," + start.y]);
    while (queue.length > 0) {
      const current = queue.shift();
      if (current.x === target.x && current.y === target.y) return true;
      const cell = maze[current.y][current.x];
      const moves = [
        { dir: "top", dx: 0, dy: -1 }, { dir: "right", dx: 1, dy: 0 },
        { dir: "bottom", dx: 0, dy: 1 }, { dir: "left", dx: -1, dy: 0 }
      ];
      for (const move of moves) {
        if (cell.walls[move.dir]) continue;
        const nx = current.x + move.dx;
        const ny = current.y + move.dy;
        const key = nx + "," + ny;
        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited.has(key)) {
          visited.add(key);
          queue.push({ x: nx, y: ny });
        }
      }
    }
    return false;
  }

  function findFarthestCellFromStart() {
    const queue = [{ x: 0, y: 0, distance: 0 }];
    const visited = new Set(["0,0"]);
    let farthest = { x: 0, y: 0, distance: 0 };
    while (queue.length > 0) {
      const current = queue.shift();
      if (current.distance > farthest.distance) farthest = current;
      const cell = maze[current.y][current.x];
      const moves = [
        { dir: "top", dx: 0, dy: -1 }, { dir: "right", dx: 1, dy: 0 },
        { dir: "bottom", dx: 0, dy: 1 }, { dir: "left", dx: -1, dy: 0 }
      ];
      for (const move of moves) {
        if (cell.walls[move.dir]) continue;
        const nx = current.x + move.dx;
        const ny = current.y + move.dy;
        const key = nx + "," + ny;
        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited.has(key)) {
          visited.add(key);
          queue.push({ x: nx, y: ny, distance: current.distance + 1 });
        }
      }
    }
    return { x: farthest.x, y: farthest.y };
  }

  function isVisible(x, y) {
    const dx = x - player.x;
    const dy = y - player.y;
    return Math.sqrt(dx * dx + dy * dy) <= visionRadius;
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawMaze();
    drawFog();
    drawExit();
    drawPlayer();
    drawWallChangeIndicator();
    if (!gameOver) animationFrame = requestAnimationFrame(draw);
  }

  function drawMaze() {
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#f2f2f2";
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        if (!isVisible(x, y)) continue;
        const cell = maze[y][x];
        const px = x * tileSize;
        const py = y * tileSize;
        ctx.fillStyle = "#1b1b1b";
        ctx.fillRect(px, py, tileSize, tileSize);
        ctx.beginPath();
        if (cell.walls.top) { ctx.moveTo(px, py); ctx.lineTo(px + tileSize, py); }
        if (cell.walls.right) { ctx.moveTo(px + tileSize, py); ctx.lineTo(px + tileSize, py + tileSize); }
        if (cell.walls.bottom) { ctx.moveTo(px + tileSize, py + tileSize); ctx.lineTo(px, py + tileSize); }
        if (cell.walls.left) { ctx.moveTo(px, py + tileSize); ctx.lineTo(px, py); }
        ctx.stroke();
      }
    }
  }

  function drawFog() {
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const dx = x - player.x;
        const dy = y - player.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance > visionRadius) {
          ctx.fillStyle = "#000";
        } else {
          const darkness = Math.min(distance / visionRadius, 1) * 0.55;
          ctx.fillStyle = "rgba(0, 0, 0, " + darkness + ")";
        }
        ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
      }
    }
  }

  function drawPlayer() {
    const centerX = player.x * tileSize + tileSize / 2;
    const centerY = player.y * tileSize + tileSize / 2;
    ctx.fillStyle = "#4da3ff";
    ctx.beginPath();
    ctx.arc(centerX, centerY, tileSize * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function drawExit() {
    if (!isVisible(exit.x, exit.y)) return;
    const px = exit.x * tileSize;
    const py = exit.y * tileSize;
    ctx.fillStyle = "#28d957";
    ctx.fillRect(px + tileSize * 0.25, py + tileSize * 0.25, tileSize * 0.5, tileSize * 0.5);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.strokeRect(px + tileSize * 0.25, py + tileSize * 0.25, tileSize * 0.5, tileSize * 0.5);
  }

  function drawWallChangeIndicator() {
    const elapsed = Date.now() - lastWallChangeTime;
    const progress = Math.min(elapsed / wallChangeInterval, 1);
    const barWidth = canvas.width * 0.7;
    const barHeight = 8;
    const x = (canvas.width - barWidth) / 2;
    const y = canvas.height - 18;
    ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
    ctx.fillRect(x, y, barWidth, barHeight);
    ctx.fillStyle = progress > 0.75 ? "#ff5555" : "#ffffff";
    ctx.fillRect(x, y, barWidth * progress, barHeight);
  }

  function movePlayer(dx, dy) {
    if (gameOver) return;
    const currentCell = maze[player.y][player.x];
    if (dx === 0 && dy === -1 && currentCell.walls.top) return;
    if (dx === 1 && dy === 0 && currentCell.walls.right) return;
    if (dx === 0 && dy === 1 && currentCell.walls.bottom) return;
    if (dx === -1 && dy === 0 && currentCell.walls.left) return;
    const newX = player.x + dx;
    const newY = player.y + dy;
    if (newX < 0 || newX >= cols || newY < 0 || newY >= rows) return;
    player.x = newX;
    player.y = newY;
    if (player.x === exit.x && player.y === exit.y) winGame();
  }

  function updateCountdown(){
    if(gameOver) return;
    timeLeft--;
    timeLeftEl.textContent = timeLeft;
    if(timeLeft <= 0) loseGame();
  }

  function winGame() {
    if(gameOver) return;
    gameOver = true;
    stopTimers();
    message.textContent = "Victoire ! Tu gagnes 1 SKIBIDIFLUX.";
    message.style.color = "var(--green)";
    grantSkibidiflux(1,"Labyrinthe");
    showModal("🌀 Labyrinthe terminé", "Victoire ! Tu gagnes 1 SKIBIDIFLUX à dépenser dans la Boutique.", [
      { label:"🛒 Aller à la boutique", action:()=>{ closeModal(); currentMazeCleanup?.(); currentMazeCleanup=null; setView("shop"); } },
      { label:"Plus tard", secondary:true, action:()=>{ closeModal(); setView("home"); } }
    ]);
  }

  function loseGame(){
    if(gameOver) return;
    gameOver = true;
    stopTimers();
    message.textContent = "Défaite : temps écoulé. Aucune récompense perdue ou gagnée.";
    message.style.color = "var(--red)";
    showModal("⏱ Défaite", "Le temps est écoulé. Tu ne perds rien, mais tu ne gagnes pas de SKIBIDIFLUX.", [
      { label:"Rejouer", action:()=>{ closeModal(); initMaze(); } },
      { label:"Accueil", secondary:true, action:()=>{ closeModal(); setView("home"); } }
    ]);
  }

  function handleKeydown(event) {
    const key = event.key.toLowerCase();
    if (["arrowup", "z", "w"].includes(key)) { event.preventDefault(); movePlayer(0, -1); }
    if (["arrowright", "d"].includes(key)) { event.preventDefault(); movePlayer(1, 0); }
    if (["arrowdown", "s"].includes(key)) { event.preventDefault(); movePlayer(0, 1); }
    if (["arrowleft", "q", "a"].includes(key)) { event.preventDefault(); movePlayer(-1, 0); }
  }

  function canvasCellFromPointer(event){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = Math.floor((event.clientX - rect.left) * scaleX / tileSize);
    const y = Math.floor((event.clientY - rect.top) * scaleY / tileSize);
    if(x < 0 || x >= cols || y < 0 || y >= rows) return null;
    return { x, y };
  }
  function moveTowardCell(target){
    if(!target || gameOver) return;
    const dx = target.x - player.x;
    const dy = target.y - player.y;
    if(dx === 0 && dy === 0) return;
    if(Math.abs(dx) >= Math.abs(dy)) movePlayer(Math.sign(dx), 0);
    else movePlayer(0, Math.sign(dy));
  }
  function handleMouseMove(event){ moveTowardCell(canvasCellFromPointer(event)); }
  function handleTouchMove(event){
    event.preventDefault();
    const touch = event.touches?.[0] || event.changedTouches?.[0];
    if(touch) moveTowardCell(canvasCellFromPointer(touch));
  }

  canvas.style.cursor = "crosshair";
  canvas.addEventListener("mousemove", handleMouseMove);
  canvas.addEventListener("click", handleMouseMove);
  canvas.addEventListener("touchstart", handleTouchMove, { passive:false });
  canvas.addEventListener("touchmove", handleTouchMove, { passive:false });
  document.addEventListener("keydown", handleKeydown);
  restartButton.addEventListener("click", initMaze);
  currentMazeCleanup = () => {
    stopTimers();
    canvas.removeEventListener("mousemove", handleMouseMove);
    canvas.removeEventListener("click", handleMouseMove);
    canvas.removeEventListener("touchstart", handleTouchMove);
    canvas.removeEventListener("touchmove", handleTouchMove);
    document.removeEventListener("keydown", handleKeydown);
  };
  initMaze();
}

function renderPackChoice(){
  if(!currentPack||currentPack.remaining<=0){

    showModal("Pack terminé 🎉", `${source} terminé ! Tes nouvelles cartes ont été ajoutées.`, [{label:"✓ Continuer", action:()=>{ closeModal(); setView(currentView==="bosses"?"bosses":"home"); }}]);
    return;
  }

    </div>
  </div></div>`;
  document.querySelectorAll(".choice-card").forEach(el=>el.addEventListener("click",()=>choosePackCard(el.dataset.key)));
}
function pickWeightedCard(excludedKey=null, pool=PACK_CATALOG){
  const available=getBalancedPackPool(pool).filter(c=>c&&c.key!==excludedKey);
  if(!available.length) return null;
  const total=available.reduce((sum,c)=>sum+getCardPackWeight(c),0);
  let roll=Math.random()*total;
  for(const c of available){ roll-=getCardPackWeight(c); if(roll<=0) return c; }
  return available[available.length-1];
}
function drawTwoRandomCards(pool=PACK_CATALOG){
  const f=pickWeightedCard(null,pool);
  return [f,pickWeightedCard(f?.key,pool)||f];
}
function choosePackCard(key){
  const card=getCard(key); if(!card||!currentPack) return;
  addOwnedCard(key); currentPack.remaining--; currentPack.picked++;
  renderSidebar(); setTimeout(renderPackChoice,250);
}
function addOwnedCard(key){
  const card=getCard(key); if(!card) return;
  markSeenCard(key);
  if(state.ownedCards[key]){ state.ownedCards[key].duplicates=(state.ownedCards[key].duplicates||0)+1; toast(`🔁 Doublon : ${card.name}`); }
  else { state.ownedCards[key]={ key, upgrade:0, duplicates:0 }; toast(`✨ Nouvelle carte : ${card.name} !`); }
  saveState();
  checkCollectionUnlocks();
}

function ownedCopies(key){ const o=state.ownedCards[key]; return o ? 1 + Number(o.duplicates||0) : 0; }

function removeOwnedCardCopy(key){
  const o=state.ownedCards[key]; if(!o) return false;
  if((o.duplicates||0)>0){ o.duplicates--; saveState(); return true; }
  markSeenCard(key);
  delete state.ownedCards[key];
  state.activeTeam=state.activeTeam.filter(k=>k!==key);
  saveState(); return true;
}
function addBossRewardCard(boss){

function randomPackCard(minPoints=1){

const FISHING_COOLDOWN_MS = 180000;
function fishingRemaining(){ return Math.max(0, FISHING_COOLDOWN_MS - (Date.now() - Number(state.lastFishingAt||0))); }
function formatTimer(ms){

function pickFishingCard(){
  const pool=PACK_CATALOG.slice();

  for(const c of pool){ roll-=getCardPackWeight(c); if(roll<=0) return c; }
  return pool[pool.length-1];
}

function playTavern(playerKeys){

  const opponent=[randomPackCard(20),randomPackCard(20),randomPackCard(20)];

}

const TEAM_BATTLE_ROTATION_MS = 300000;
const TEAM_BATTLE_COOLDOWN_MS = 180000;
function teamBattleCooldownRemaining(){ return Math.max(0, TEAM_BATTLE_COOLDOWN_MS - (Date.now() - Number(state.lastTeamBattleAt||0))); }
function ensureTeamBattleTeams(force=false){
  const expired=Date.now()-Number(state.teamBattleGeneratedAt||0)>=TEAM_BATTLE_ROTATION_MS;
  if(force||expired||!Array.isArray(state.teamBattleTeams)||state.teamBattleTeams.length!==3){
    state.teamBattleTeams=Array.from({length:3},(_,i)=>generateEnemyTeam(i));
    state.teamBattleGeneratedAt=Date.now();
    saveState();
  }
}
function generateEnemyTeam(i=0){
  const pool=shuffleArray(PACK_CATALOG).slice(0,5);
  return { id:`enemy-${Date.now()}-${i}-${Math.random().toString(16).slice(2)}`, name:["Les Brise-Cœurs","Les Red Flags","Les Charmeuses"][i]||`Équipe ${i+1}`, keys:pool.map(c=>c.key) };
}
function teamBattlePower(keys){ return keys.reduce((s,k)=>s+(getCard(k)?.points||0),0); }
function renderTeamBattleLobby(){
  cleanExpiredCooldowns(); ensureTeamBattleTeams();
  viewTitle.textContent="⚔ Combat d'équipe";
  viewHint.textContent="Choisis une des 3 équipes générées. Un combat d'équipe est possible toutes les 3 minutes.";
  const remaining=Math.max(0, TEAM_BATTLE_ROTATION_MS-(Date.now()-Number(state.teamBattleGeneratedAt||0)));
  const teamCooldown=teamBattleCooldownRemaining();
  const canStartTeamBattle=teamCooldown<=0;
  const playerAvailable=state.activeTeam.filter(k=>state.ownedCards[k]&&!isCardHealing(k));
  const teams=state.teamBattleTeams.map((team,idx)=>{
    const cards=team.keys.map(getCard).filter(Boolean);
    const mini=cards.map(c=>`<span class="enemy-mini-card" title="${esc(c.name)}" style="background:${imgBg(c,c.originalIndex)};background-size:cover;background-position:center top"></span>`).join("");
    return `<article class="enemy-team-card">
      <div class="enemy-team-title">${esc(team.name)}</div>
      <div class="boss-mini-power">Puissance totale : <strong>${teamBattlePower(team.keys)}</strong></div>
      <div class="enemy-mini-cards">${mini}</div>
      <button class="btn btn-primary btn-sm" data-start-team-battle="${idx}" ${playerAvailable.length&&canStartTeamBattle?'':'disabled'}>${canStartTeamBattle?'Affronter':`Cooldown ${formatTimer(teamCooldown)}`}</button>
    </article>`;
  }).join("");
  content.innerHTML=`
    <div class="hero-section" style="padding:22px 28px">
      <h2 class="hero-title" style="font-size:clamp(1.5rem,3vw,2.8rem)">Combat d'équipe 5v5</h2>
      <div class="team-summary-row">
        <span class="team-summary-pill">Ton équipe prête : <strong>${playerAvailable.length}/${MAX_TEAM_SIZE}</strong></span>
        <span class="team-summary-pill">Rotation : <strong>${formatTimer(remaining)}</strong></span>
        <span class="team-summary-pill">Prochain combat : <strong>${canStartTeamBattle?'disponible':formatTimer(teamCooldown)}</strong></span>
        <span class="team-summary-pill">Règle : <strong>aucun tour vide</strong></span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
        <button class="btn btn-secondary" onclick="regenerateTeamBattles()">🔄 Regénérer maintenant</button>
        <button class="btn btn-cyan" onclick="setView('team')">🧩 Modifier mon équipe</button>
      </div>
    </div>
    <div class="enemy-team-grid">${teams}</div>`;
  document.querySelectorAll("[data-start-team-battle]").forEach(btn=>btn.addEventListener("click",()=>startTeamBattle(Number(btn.dataset.startTeamBattle))));
  renderSidebar();
}
function regenerateTeamBattles(){ ensureTeamBattleTeams(true); renderTeamBattleLobby(); toast("🔄 Nouvelles équipes créées."); }
function startTeamBattle(index){
  cleanExpiredCooldowns(); ensureTeamBattleTeams();
  const cooldown=teamBattleCooldownRemaining();
  if(cooldown>0){
    showModal("⏳ Combat d'équipe en recharge", `Tu pourras relancer un combat d'équipe dans ${formatTimer(cooldown)}.`, [
      {label:"Fermer", secondary:true, action:closeModal}
    ]);
    return;
  }
  const enemy=state.teamBattleTeams[index]; if(!enemy) return;
  const playerKeys=state.activeTeam.filter(k=>state.ownedCards[k]&&!isCardHealing(k)).slice(0,MAX_TEAM_SIZE);
  if(!playerKeys.length){
    showModal("⏳ Équipe indisponible","Aucune carte active n'est prête. Attends la régénération ou change ton équipe.",[
      {label:"Composer l'équipe", action:()=>{closeModal();setView('team');}},
      {label:"Fermer", secondary:true, action:closeModal}
    ]); return;
  }
  state.lastTeamBattleAt=Date.now();
  saveState();
  currentBattle={
    mode:"team", enemyName:enemy.name, locked:false, lastFx:null,
    log:"Choisis une carte vivante : elle attaquera la première carte ennemie vivante. L'ennemi riposte toujours s'il a quelqu'un en vie.",
    player:Object.fromEntries(playerKeys.map(k=>[k,{hp:finalPoints(k),maxHp:finalPoints(k),atk:finalPoints(k)}])),
    enemy:Object.fromEntries(enemy.keys.map(k=>[k,{hp:getCard(k).points,maxHp:getCard(k).points,atk:getCard(k).points,key:k}]))
  };
  renderTeamBattleFight();
}
function firstAliveUnit(units){ return Object.entries(units).find(([,u])=>u.hp>0); }
function renderTeamBattleFight(){
  if(!currentBattle||currentBattle.mode!=="team") return;
  viewTitle.textContent=currentBattle?.arenaMode==='colisee'?"🏛 Colysée":"⚔ Combat d'équipe";
  const playerAlive=Object.values(currentBattle.player).filter(u=>u.hp>0).length;
  const enemyAlive=Object.values(currentBattle.enemy).filter(u=>u.hp>0).length;
  const cardBtn=(key,unit,side)=>{
    const card=getCard(key); if(!card) return "";
    const dead=unit.hp<=0; const hpPct=Math.max(0,Math.round((unit.hp/unit.maxHp)*100));
    const attrs=side==='player'?`data-team-combat-card="${key}" ${dead||currentBattle.locked?'disabled':''}`:"disabled";
    return `<button class="combat-card-btn ${side==='enemy'?'enemy-target':''} ${dead?'dead':''} ${card?.hsVariant?'hs-variant':''}" ${attrs}>
      <div class="combat-card-img ${card?.hsVariant?'hs-variant':''}" style="background:${imgBg(card,card.originalIndex)};background-size:cover;background-position:center top"></div>
      <div class="combat-card-info">
        <div class="combat-card-name">${esc(card.name)}</div>
        <div class="combat-card-stats">ATK ${unit.atk} · PV ${Math.max(0,unit.hp)}/${unit.maxHp}</div>
        <div class="hp-wrap"><div class="hp-fill" style="--hp:${hpPct}%"></div></div>
      </div>
    </button>`;
  };
  const fx=currentBattle.lastFx;
  const fxHtml=fx?`<div class="attack-burst ${fx.side}" style="--scale:${attackScale(fx.damage)}"></div><div class="power-wave" style="--scale:${attackScale(fx.damage)};--x:${fx.side==='player'?'72%':'28%'};--y:${fx.side==='player'?'44%':'58%'}"></div>`:"";
  content.innerHTML=`<div class="battle-scene" style="--boss-glow:#ff3dcd;--boss-accent:#f5c842">
    ${fxHtml}
    <div class="battle-header"><h2 class="battle-boss-name">${esc(currentBattle.enemyName)}</h2><p class="battle-score-line">Ton équipe ${playerAlive}/5 · Ennemis ${enemyAlive}/5</p></div>
    <div class="team-vs-layout">
      <div class="team-vs-side"><div class="section-title">Ton équipe vivante</div><div class="combat-card-list">${Object.entries(currentBattle.player).map(([k,u])=>cardBtn(k,u,'player')).join("")}</div></div>
      <div class="team-vs-side enemy"><div class="section-title">Équipe adverse</div><div class="combat-card-list">${Object.entries(currentBattle.enemy).map(([k,u])=>cardBtn(k,u,'enemy')).join("")}</div></div>
    </div>
    <div class="combat-log">${currentBattle.log}</div>
  </div>`;
  document.querySelectorAll("[data-team-combat-card]").forEach(btn=>btn.addEventListener("click",()=>teamCombatAttack(btn.dataset.teamCombatCard)));
  renderSidebar();
}
function teamCombatAttack(playerKey){
  if(!currentBattle||currentBattle.mode!=="team"||currentBattle.locked) return;
  const p=currentBattle.player[playerKey]; const pCard=getCard(playerKey);
  const enemyEntry=firstAliveUnit(currentBattle.enemy);
  if(!p||p.hp<=0||!enemyEntry){ if(!enemyEntry) finishTeamBattleVictory(); return; }
  const [enemyKey,e]=enemyEntry; const eCard=getCard(enemyKey);
  currentBattle.locked=true;
  e.hp-=p.atk; currentBattle.lastFx={side:"player",damage:p.atk};
  currentBattle.log=`${pCard.name} attaque ${eCard.name} et inflige ${p.atk} dégâts.`;
  renderTeamBattleFight();
  setTimeout(()=>{
    if(!currentBattle||currentBattle.mode!=="team") return;
    if(Object.values(currentBattle.enemy).every(u=>u.hp<=0)){ finishTeamBattleVictory(); return; }
    const replyEntry=firstAliveUnit(currentBattle.enemy);
    const targetEntry=firstAliveUnit(currentBattle.player);
    if(!replyEntry||!targetEntry){ if(!targetEntry) finishTeamBattleDefeat(); return; }
    const [atkKey,atk]=replyEntry; const [targetKey,target]=targetEntry;
    const atkCard=getCard(atkKey); const targetCard=getCard(targetKey);
    target.hp-=atk.atk; currentBattle.lastFx={side:"boss",damage:atk.atk};
    if(target.hp<=0){
      target.hp=0; state.cardCooldowns[targetKey]=Date.now()+CARD_REVIVE_MS; saveState();
      currentBattle.log=`${atkCard.name} riposte et met ${targetCard.name} KO. Régénération : 90 secondes.`;
    } else currentBattle.log=`${atkCard.name} riposte sur ${targetCard.name}. Il lui reste ${target.hp} PV.`;
    currentBattle.locked=false; renderTeamBattleFight();
    setTimeout(()=>{
      if(!currentBattle||currentBattle.mode!=="team") return;
      currentBattle.lastFx=null;
      if(Object.values(currentBattle.player).every(u=>u.hp<=0)) finishTeamBattleDefeat();
      else renderTeamBattleFight();
    },650);
  },760);
}
function finishTeamBattleVictory(){
  currentBattle=null; state.plusOnes+=PLUS_ONES_PER_BOSS_WIN; state.popopipipapa=Number(state.popopipipapa||0)+1; ensureTeamBattleTeams(true); saveState(); renderSidebar();
  showModal("🏆 Victoire 5v5",`Tu remportes le combat d'équipe ! +${PLUS_ONES_PER_BOSS_WIN} ressource et +1 SKIBIDIFLUX. Prochain combat dans 3 minutes. Les 3 équipes adverses ont été renouvelées.`,[

    {label:"Retour combat équipe",secondary:true,action:()=>{closeModal();setView('teamBattle');}}
  ]);
}
function finishTeamBattleDefeat(){
  currentBattle=null; ensureTeamBattleTeams(true); saveState(); renderSidebar();
  showModal("💀 Défaite 5v5","Ton équipe a été éliminée. Les cartes KO régénèrent pendant 90 secondes. Prochain combat d'équipe dans 3 minutes. Les équipes adverses ont été renouvelées.",[

  ]);
}

function initMap(){

  }).addTo(map);

      iconSize:[72,72], iconAnchor:[36,36], popupAnchor:[0,-38]

function renderBossSuggestionsBelowMap(){

function getBossStatus(boss){

function attackScale(value){ return Math.max(.8, Math.min(3.2, Number(value||1)/55)); }

function combatCardAttack(key){
  if(!currentBattle||currentBattle.locked) return;
  const unit=currentBattle.cards[key]; const card=getCard(key);
  if(!unit||unit.hp<=0||!card) return;
  currentBattle.locked=true;
  currentBattle.bossHp-=unit.atk;
  currentBattle.lastFx={side:"player",damage:unit.atk};
  currentBattle.log=`${card.name} attaque en premier et inflige ${unit.atk} dégâts à ${currentBattle.boss.name}.`;
  renderTurnBattle();

  setTimeout(()=>{
    if(!currentBattle) return;
    if(currentBattle.bossHp<=0){ finishBattleVictory(); return; }

    unit.hp-=currentBattle.boss.value;
    currentBattle.lastFx={side:"boss",damage:currentBattle.boss.value};
    if(unit.hp<=0){
      unit.hp=0;
      state.cardCooldowns[key]=Date.now()+CARD_REVIVE_MS;
      saveState();
      currentBattle.log=`${currentBattle.boss.name} contre-attaque à ${currentBattle.boss.value}. ${card.name} tombe KO et guérit pendant 90 secondes.`;
    } else {
      currentBattle.log=`${currentBattle.boss.name} contre-attaque à ${currentBattle.boss.value}. ${card.name} survit avec ${unit.hp} PV.`;
    }
    currentBattle.locked=false;
    renderTurnBattle();

    setTimeout(()=>{
      if(!currentBattle) return;
      currentBattle.lastFx=null;
      if(Object.values(currentBattle.cards).every(u=>u.hp<=0)) finishBattleDefeat();
      else renderTurnBattle();
    },650);
  },760);
}

function finishBattleVictory(){
  const {boss,firstWin}=currentBattle;
  currentBattle.log=`Victoire ! ${boss.name} est vaincu.`;
  currentBattle.lastFx=null;
  renderTurnBattle();
  setTimeout(()=>{ currentBattle=null; completeBossWin(boss,firstWin); },900);
}

function finishBattleDefeat(){
  const boss=currentBattle?.boss;
  currentBattle=null;
  renderSidebar();
  showModal("💀 Défaite", `${boss?.name||"Le boss"} a éliminé toute ton équipe. Les cartes KO doivent guérir 90 secondes avant de pouvoir combattre à nouveau.`, [
    { label:"Retour aux boss", action:()=>{ closeModal(); setView("bosses"); } },
    { label:"Collection", secondary:true, action:()=>{ closeModal(); setView("collection"); } }
  ]);
}

function bossRewardMultiplier(boss){
  const value = Number(boss?.value || 0);
  return Math.max(1, Math.floor((value - 1) / 100));
}
function completeBossWin(boss,firstWin){
  const mult = bossRewardMultiplier(boss);
  const plusReward = PLUS_ONES_PER_BOSS_WIN * mult;
  const popoReward = firstWin ? mult : 0;
  if(firstWin&&!state.defeatedBosses.includes(boss.id)) state.defeatedBosses.push(boss.id);
  state.bossWins=Number(state.bossWins||0)+1;
  state.plusOnes+=plusReward;
  if(firstWin){
    state.popopipipapa=Number(state.popopipipapa||0)+popoReward;
    if(boss.special) addBossRewardCard(boss);
  }
  saveState(); renderSidebar();

  const multText = mult>1 ? ` · multiplicateur boss ×${mult}` : "";
  const rewardText = firstWin
    ? `+${plusReward} ressource${plusReward>1?"s":""} · +${popoReward} SKIBIDIFLUX${boss.special?" · carte boss ajoutée":""}${multText}`
    : `+${plusReward} ressource${plusReward>1?"s":""} · déjà vaincu : pas de SKIBIDIFLUX${multText}`;

  showModal("🏆 Récompenses", `${boss.name} est vaincu ! ${rewardText}.`, [
    { label:"🛒 Aller à la boutique", action:()=>{ closeModal(); setView("shop"); } },
    { label:"Plus tard", secondary:true, action:()=>{ closeModal(); setView("bosses"); } }
  ]);
}
function openDeveloperCode(){
  const pwd=prompt("Code développeur");
  if(pwd!=="123456"){ toast("Code développeur incorrect."); return; }
  showModal("🛠 Menu développeur","Cheat codes temporaires pour tester le jeu.",[

    { label:"💚 Revive tout le monde", action:()=>{ state.cardCooldowns={}; saveState(); renderSidebar(); closeModal(); toast("Toutes les cartes sont guéries."); } },
    { label:"Fermer", secondary:true, action:closeModal }
  ]);
}

function showModal(title,text,actions=[]){
  modalCard.innerHTML=`
    <div class="modal-title">${esc(title)}</div>
    <p class="modal-text">${esc(text)}</p>
    <div class="modal-actions">${actions.map((a,i)=>`<button class="btn ${a.secondary?"btn-secondary":"btn-primary"}" data-modal-action="${i}">${esc(a.label)}</button>`).join("")}</div>
  `;
  modal.classList.add("active");
  modalCard.querySelectorAll("[data-modal-action]").forEach(btn=>btn.addEventListener("click",()=>actions[Number(btn.dataset.modalAction)]?.action?.()));
}
function closeModal(){ modal.classList.remove("active"); }
function toast(message){
  const el=document.createElement("div"); el.className="toast-item"; el.textContent=message;
  toastBox.appendChild(el); setTimeout(()=>el.remove(),2800);
}

function labyrinthRemaining(){ return Math.max(0, LABYRINTH_COOLDOWN_MS - (Date.now()-Number(state.lastLabyrinthAt||0))); }
const COURSE_POTION_MS = 300000;
const COURSE_SKIBIDIFLUX_MS = 600000;

function ensureNewProgressFields(){
  state.potions = Number(state.potions||0);
  state.lastCoursePotionAt = Number(state.lastCoursePotionAt||0);
  state.lastCoursePopopipapaAt = Number(state.lastCoursePopopipapaAt||0);
  state.lastBossRushAt = Number(state.lastBossRushAt||0);
  state.exclusive250Unlocked = !!state.exclusive250Unlocked;
  if(!state.cardScoreInitialized){
    state.cardScore = getOwnedList().reduce((sum,o)=>sum + (Number(o.card.points||0) * ownedCopies(o.key)), 0);
    state.cardScoreInitialized = true;
  }
  state.cardScore = Number(state.cardScore||0);
  if(typeof state.lastSkibidifluxLevelReward !== "number"){
    state.lastSkibidifluxLevelReward = Math.floor(state.cardScore/50)+1;
  } else {
    state.lastSkibidifluxLevelReward = Number(state.lastSkibidifluxLevelReward||1);
  }
}
ensureNewProgressFields();

function progressScore(){ ensureNewProgressFields(); return Number(state.cardScore||0); }
function playerLevel(){ return Math.floor(progressScore()/50)+1; }
function nextLevelScore(){ return playerLevel()*50; }
function scoreToNextLevel(){ return Math.max(0,nextLevelScore()-progressScore()); }
function checkLevelSkibidifluxReward(){
  ensureNewProgressFields();
  const lvl = playerLevel();
  const lastRewarded = Number(state.lastSkibidifluxLevelReward||1);
  if(lvl > lastRewarded){
    const gained = lvl - lastRewarded;
    state.popopipipapa = Number(state.popopipipapa||0) + gained;
    state.lastSkibidifluxLevelReward = lvl;
    saveState();
    renderSidebar?.();
    toast(`🎉 Niveau ${lvl} atteint : +${gained} SKIBIDIFLUX !`);
  }
}

    const boss=ALL_BOSSES.find(b=>b.id===bossId); if(!boss) return;

      boss, firstWin,

      <div class="boss-mini-name">${boss.special?'🌟 ':''}${esc(boss.name)}</div>

  };

  getBossStatus = function(boss){

  };

  };

  bindBossPopupButtons = function(){
    document.querySelectorAll('[data-boss-id]').forEach(btn=>btn.addEventListener('click',()=>fightBossFree(btn.dataset.bossId)));

  document.head.appendChild(musicStyle);

  const MUSIC_FOLDER='musique/';
  const MUSIC_TRACKS=[
    '1.mp3','2.mp3','3.mp3','4.mp3','5.mp3',
    '6.mp3','7.mp3','8.mp3','8.mp3','9.mp3',
    '11.mp3','12.mp3','13.mp3','14.mp3','15.mp3','16.mp3',
	'17.mp3','18.mp3','19.mp3','20.mp3','21.mp3','22.mp3','23.mp3','24.mp3','25.mp3'
  ];
  let playlist=MUSIC_TRACKS.map(name=>MUSIC_FOLDER+name);
  let remainingTracks=[];
  const audio=new Audio();
  audio.volume=0.35;
  audio.preload='none';
  const btn=document.createElement('button');
  btn.className='music-toggle';
  btn.type='button';
  btn.textContent='🎵 Musique';
  document.body.appendChild(btn);

  function shufflePick(){
    if(!remainingTracks.length) remainingTracks=[...playlist].sort(()=>Math.random()-0.5);
    return remainingTracks.shift();
  }
  function playRandomTrack(){
    if(!playlist.length) return;
    audio.src=shufflePick();
    audio.play().then(()=>{ btn.textContent='🔊 Musique ON'; }).catch(()=>{ btn.textContent='🎵 Cliquer musique'; });
  }
  audio.addEventListener('ended', playRandomTrack);
  audio.addEventListener('error', ()=>{
    if(remainingTracks.length) playRandomTrack();
    else btn.textContent='🎵 Musique';
  });
  btn.addEventListener('click',()=>{
    if(audio.paused) playRandomTrack();
    else { audio.pause(); btn.textContent='🔇 Musique OFF'; }
  });
  // La musique ne démarre jamais automatiquement : uniquement via le bouton dédié.

  fetch(MUSIC_FOLDER+'playlist.json').then(r=>r.ok?r.json():null).then(list=>{
    if(Array.isArray(list) && list.length){
      playlist=list.map(name=>String(name).startsWith(MUSIC_FOLDER)?String(name):MUSIC_FOLDER+String(name));
      remainingTracks=[];
    }
  }).catch(()=>{});
})();

    if(idx>=0){ EXCHANGE_STATE.selected.splice(idx,1); renderExchange(); return; }
    if(EXCHANGE_STATE.selected.length>=5){ toast('Tu as déjà sélectionné 5 cartes.'); return; }
    if(selectedCountFor(key)>=ownedCopies(key)){ toast('Tu n’as pas assez d’exemplaires de cette carte.'); return; }

  }
  function renderExchangeSelected(){

  function renderExchange(){
    currentView=EXCHANGE_VIEW; closeModal(); configureShopPackPrices();

      const card=o.card; const copies=ownedCopies(o.key); const selected=selectedCountFor(o.key); const disabled=selected>=copies || EXCHANGE_STATE.selected.length>=5;

      <div class="exchange-layout"><aside class="exchange-panel"><div class="section-title">Type d'échange</div><div class="exchange-mode-grid">${EXCHANGE_MODES.map(m=>`<button class="exchange-mode-btn ${m.id===mode.id?'active':''}" data-exchange-mode="${m.id}">${esc(m.label)}</button>`).join('')}</div><p class="maze-info">${esc(mode.desc)}</p><div class="section-title" style="margin-top:16px">Cartes données</div><div class="exchange-selected-list">${renderExchangeSelected()}</div><button class="btn btn-primary btn-full" id="confirmExchangeBtn" ${EXCHANGE_STATE.selected.length!==5||pool.length<1?'disabled':''}>Échanger 5 cartes</button><button class="btn btn-secondary btn-full" id="clearExchangeBtn" ${EXCHANGE_STATE.selected.length?'':'disabled'}>Vider la sélection</button></aside><section class="exchange-panel"><div class="section-title">Cartes disponibles pour cet échange</div><div class="exchange-grid">${cards||'<p class="no-team-hint">Aucune carte éligible pour ce mode.</p>'}</div></section></div>`;
    content.querySelectorAll('[data-exchange-mode]').forEach(btn=>btn.addEventListener('click',()=>{ resetExchangeSelection(btn.dataset.exchangeMode); renderExchange(); }));
    content.querySelectorAll('[data-exchange-card]').forEach(btn=>btn.addEventListener('click',()=>toggleExchangeCard(btn.dataset.exchangeCard)));
    content.querySelectorAll('[data-exchange-remove]').forEach(btn=>btn.addEventListener('click',()=>{ EXCHANGE_STATE.selected.splice(Number(btn.dataset.exchangeRemove),1); renderExchange(); }));
    document.getElementById('clearExchangeBtn')?.addEventListener('click',()=>{ EXCHANGE_STATE.selected=[]; renderExchange(); });
    document.getElementById('confirmExchangeBtn')?.addEventListener('click',confirmExchange);
    renderSidebar();
  }
  function renderExchangeReward(reward){

      </article><div class="team-summary-row"><span class="team-summary-pill">Carte reçue : <strong>${esc(reward.name)}</strong></span><span class="team-summary-pill">Puissance : <strong>${Number(reward.points||0)}</strong></span></div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"><button class="btn btn-primary" id="exchangeAgainBtn">Continuer les échanges</button><button class="btn btn-secondary" id="exchangeCollectionBtn">Voir la collection</button></div></div></div>`;

  function confirmExchange(){

    for(const [key,count] of Object.entries(counts)){

  }

  const previousSetViewFinal2 = setView;

    }

})();


/* ─── PATCH : MODE COLYSÉE ───────────────────────────── */
(function(){
  const COLISEE_VIEW = 'colisee';
  const COLISEE_MIN_TEAM_POWER = 300;
  const COLISEE_ROTATION_MS = TEAM_BATTLE_ROTATION_MS;
  const COLISEE_COOLDOWN_MS = TEAM_BATTLE_COOLDOWN_MS;
  const COLISEE_NAMES = ['Gladiateurs dorés','Titans du Colysée','Légendes de l’arène'];

  function ensureColiseeState(){
    if(!Array.isArray(state.coliseeTeams)) state.coliseeTeams=[];
    state.coliseeGeneratedAt = Number(state.coliseeGeneratedAt||0);
    state.lastColiseeAt = Number(state.lastColiseeAt||0);
  }
  function coliseeCooldownRemaining(){ ensureColiseeState(); return Math.max(0, COLISEE_COOLDOWN_MS - (Date.now() - Number(state.lastColiseeAt||0))); }
  function coliseeTeamPower(keys){ return keys.reduce((s,k)=>s+(getCard(k)?.points||0),0); }
  function generateColiseeEnemyTeam(i=0){
    const pool=(PACK_CATALOG||CATALOG).filter(c=>c && Number(c.points||0)>0);
    const topFallback=pool.slice().sort((a,b)=>Number(b.points||0)-Number(a.points||0)).slice(0,5).map(c=>c.key);
    for(let attempt=0; attempt<350; attempt++){
      const keys=shuffleArray(pool).slice(0,5).map(c=>c.key);
      if(coliseeTeamPower(keys)>=COLISEE_MIN_TEAM_POWER){
        return { id:`colisee-${Date.now()}-${i}-${Math.random().toString(16).slice(2)}`, name:COLISEE_NAMES[i]||`Équipe Colysée ${i+1}`, keys };
      }
    }
    return { id:`colisee-${Date.now()}-${i}-fallback`, name:COLISEE_NAMES[i]||`Équipe Colysée ${i+1}`, keys:topFallback };
  }
  function ensureColiseeTeams(force=false){
    ensureColiseeState();
    const expired=Date.now()-Number(state.coliseeGeneratedAt||0)>=COLISEE_ROTATION_MS;
    if(force||expired||!Array.isArray(state.coliseeTeams)||state.coliseeTeams.length!==3){
      state.coliseeTeams=Array.from({length:3},(_,i)=>generateColiseeEnemyTeam(i));
      state.coliseeGeneratedAt=Date.now();
      saveState();
    }
  }
  function renderColiseeLobby(){
    cleanExpiredCooldowns(); ensureColiseeTeams();
    currentView=COLISEE_VIEW;
    viewTitle.textContent='🏛 Colysée';
    viewHint.textContent='Même principe que le combat d’équipe, avec des équipes adverses à 300 de puissance minimum.';
    const remaining=Math.max(0, COLISEE_ROTATION_MS-(Date.now()-Number(state.coliseeGeneratedAt||0)));
    const cooldown=coliseeCooldownRemaining();
    const canStart=cooldown<=0;
    const playerAvailable=state.activeTeam.filter(k=>state.ownedCards[k]&&!isCardHealing(k));
    const teams=state.coliseeTeams.map((team,idx)=>{
      const cards=team.keys.map(getCard).filter(Boolean);
      const power=coliseeTeamPower(team.keys);
      const mini=cards.map(c=>`<span class="enemy-mini-card" title="${esc(c.name)}" style="background:${imgBg(c,c.originalIndex)};background-size:cover;background-position:center top"></span>`).join('');
      return `<article class="enemy-team-card"><div class="enemy-team-title">${esc(team.name)}</div><div class="boss-mini-power">Puissance totale : <strong>${power}</strong></div><div class="boss-mini-status">Seuil Colysée : ${power>=COLISEE_MIN_TEAM_POWER?'validé':'fallback'} · minimum ${COLISEE_MIN_TEAM_POWER}</div><div class="enemy-mini-cards">${mini}</div><button class="btn btn-primary btn-sm" data-start-colisee="${idx}" ${playerAvailable.length&&canStart?'':'disabled'}>${canStart?'Affronter':`Cooldown ${formatTimer(cooldown)}`}</button></article>`;
    }).join('');
    content.innerHTML=`<div class="hero-section" style="padding:22px 28px"><h2 class="hero-title" style="font-size:clamp(1.5rem,3vw,2.8rem)">🏛 Colysée 5v5</h2><div class="team-summary-row"><span class="team-summary-pill">Ton équipe prête : <strong>${playerAvailable.length}/${MAX_TEAM_SIZE}</strong></span><span class="team-summary-pill">Puissance adverse min. : <strong>${COLISEE_MIN_TEAM_POWER}</strong></span><span class="team-summary-pill">Rotation : <strong>${formatTimer(remaining)}</strong></span><span class="team-summary-pill">Prochain combat : <strong>${canStart?'disponible':formatTimer(cooldown)}</strong></span></div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px"><button class="btn btn-secondary" id="regenColiseeBtn">🔄 Regénérer maintenant</button><button class="btn btn-cyan" onclick="setView('team')">🧩 Modifier mon équipe</button></div></div><div class="enemy-team-grid">${teams}</div>`;
    document.querySelectorAll('[data-start-colisee]').forEach(btn=>btn.addEventListener('click',()=>startColiseeBattle(Number(btn.dataset.startColisee))));
    document.getElementById('regenColiseeBtn')?.addEventListener('click',()=>{ ensureColiseeTeams(true); renderColiseeLobby(); toast('🏛 Nouvelles équipes du Colysée créées.'); });
    renderSidebar();
  }
  function startColiseeBattle(index){
    cleanExpiredCooldowns(); ensureColiseeTeams();
    const cooldown=coliseeCooldownRemaining();
    if(cooldown>0){ showModal('⏳ Colysée en recharge', `Tu pourras relancer un combat du Colysée dans ${formatTimer(cooldown)}.`, [{label:'Fermer',secondary:true,action:closeModal}]); return; }
    const enemy=state.coliseeTeams[index]; if(!enemy) return;
    const playerKeys=state.activeTeam.filter(k=>state.ownedCards[k]&&!isCardHealing(k)).slice(0,MAX_TEAM_SIZE);
    if(!playerKeys.length){ showModal('⏳ Équipe indisponible','Aucune carte active n’est prête. Attends la régénération ou change ton équipe.',[{label:'Composer l’équipe',action:()=>{closeModal();setView('team');}},{label:'Fermer',secondary:true,action:closeModal}]); return; }
    state.lastColiseeAt=Date.now(); saveState();
    currentBattle={ mode:'team', arenaMode:'colisee', enemyName:enemy.name, locked:false, lastFx:null, log:'Colysée : choisis une carte vivante pour attaquer la première carte ennemie vivante.', player:Object.fromEntries(playerKeys.map(k=>[k,{hp:finalPoints(k),maxHp:finalPoints(k),atk:finalPoints(k)}])), enemy:Object.fromEntries(enemy.keys.map(k=>[k,{hp:getCard(k).points,maxHp:getCard(k).points,atk:getCard(k).points,key:k}])) };
    renderTeamBattleFight();
  }

  const previousSetViewColisee=setView;
  setView=function(view){ if(view===COLISEE_VIEW) return renderColiseeLobby(); return previousSetViewColisee(view); };

  const previousFinishVictory=finishTeamBattleVictory;
  finishTeamBattleVictory=function(){
    if(currentBattle?.arenaMode==='colisee'){
      currentBattle=null; state.plusOnes+=PLUS_ONES_PER_BOSS_WIN; state.popopipipapa=Number(state.popopipipapa||0)+1; ensureColiseeTeams(true); saveState(); renderSidebar();
      showModal('🏛 Victoire au Colysée',`Tu remportes le combat du Colysée ! +${PLUS_ONES_PER_BOSS_WIN} ressource et +1 SKIBIDIFLUX. Prochain combat dans 3 minutes.`,[{label:'Retour Colysée',action:()=>{closeModal();setView('colisee');}},{label:'🛒 Aller à la boutique',secondary:true,action:()=>{closeModal();setView('shop');}}]);
      return;
    }
    previousFinishVictory();
  };
  const previousFinishDefeat=finishTeamBattleDefeat;
  finishTeamBattleDefeat=function(){
    if(currentBattle?.arenaMode==='colisee'){
      currentBattle=null; ensureColiseeTeams(true); saveState(); renderSidebar();
      showModal('💀 Défaite au Colysée','Ton équipe a été éliminée. Les cartes KO régénèrent pendant 90 secondes. Prochain combat du Colysée dans 3 minutes.',[{label:'Retour Colysée',action:()=>{closeModal();setView('colisee');}},{label:'Collection',secondary:true,action:()=>{closeModal();setView('collection');}}]);
      return;
    }
    previousFinishDefeat();
  };

  const navButtons=document.querySelector('.nav-buttons');
  if(navButtons && !navButtons.querySelector('[data-view="colisee"]')){
    const btn=document.createElement('button');
    btn.className='btn btn-cyan btn-sm'; btn.dataset.view=COLISEE_VIEW; btn.textContent='Colysée';
    const teamBtn=navButtons.querySelector('[data-view="teamBattle"]');
    if(teamBtn) teamBtn.insertAdjacentElement('afterend',btn); else navButtons.appendChild(btn);
  }
  const previousRenderHomeColisee=renderHome;
  renderHome=function(){
    previousRenderHomeColisee();
    const combatButtons=content.querySelector('.home-action-group:nth-child(3) .home-action-buttons');
    if(combatButtons && !combatButtons.querySelector('[onclick="setView(\'colisee\')"]')){
      const teamBattleBtn=combatButtons.querySelector('[onclick="setView(\'teamBattle\')"]');
      const html=`<button class="btn btn-cyan" onclick="setView('colisee')">🏛 Colysée</button>`;
      if(teamBattleBtn) teamBattleBtn.insertAdjacentHTML('afterend',html); else combatButtons.insertAdjacentHTML('beforeend',html);
    }
  };
  window.renderColiseeLobby=renderColiseeLobby;
})();

/* ═══════════════════════════════════════════════════════
   PATCH MODES : HISTOIRE + DONJONS + BATTLE ROYAL + TOURNOIS + PUZZLES
   Ajouté proprement en extension : données éditables en haut du bloc.
══════════════════════════════════════════════════════════ */
(function(){
  const STORY_VIEW='storyMode';
  const DUNGEON_VIEW='dungeons';
  const ROYAL_VIEW='battleRoyal';
  const TOURNAMENT_VIEW='tournament';
  const PUZZLE_VIEW='puzzles';
  const CARD_REGEN_MS=60*1000, TOURNAMENT_CARD_REGEN_MS=4*60*1000, MODE_COOLDOWN_MS=5*60*1000, DUNGEON_COOLDOWN_MS=5*60*1000;

  const STORY_EXCLUSIVE_CARDS=[
    {key:'story-exclusive-50',name:'adefinir',points:46,image:'picap/and1.jpg',collections:['Histoire'],exclusive:true},
    {key:'story-exclusive-100',name:'Nami et Robin',points:77,image:'picap/op.png',collections:['Histoire', 'One Piece'],exclusive:true}
  ];
  STORY_EXCLUSIVE_CARDS.forEach(card=>{if(!CATALOG.some(c=>c.key===card.key)) CATALOG.push({...card,originalIndex:CATALOG.length});});

  const MODE_REWARD_CARDS=[
    {key:'mode-reward-luffy-gear-5',name:'Micro',points:14,image:'picap/micro.jpg',collections:['Upgrade Boruto'],exclusive:true,modeReward:true},
    {key:'mode-reward-naruto-sasuke',name:'Perruque',points:14,image:'picap/perruque.jpeg',collections:['Upgrade Deb'],exclusive:true,modeReward:true}
  ];
  MODE_REWARD_CARDS.forEach(card=>{if(!CATALOG.some(c=>c.key===card.key)) CATALOG.push({...card,originalIndex:CATALOG.length});});
  function grantModeRewardCard(key, reason){
    const card=getCard(key);
    if(!card)return '';
    addOwnedCard(key);
    return `<br>Carte bonus gagnée : <strong>${esc(card.name)}</strong>${reason?` (${esc(reason)})`:''}.`;
  }

  /* MODIF FACILE — RÉCOMPENSES PUZZLES
     Écris ici les 3 cartes possibles pour chaque puzzle.
     Tu peux mettre soit la key exacte, soit le nom visible de la carte.
     Le jeu tirera ensuite 1 carte au hasard parmi ces 3 cartes. */
  const MANUAL_PUZZLE_REWARD_CHOICES={
    'puzzle-bronze':['Kimk Smurf','Margot','Angy Heaven Baby'],
    'puzzle-rare':['Micro','Perruque','Les pirates Baby'],
    'puzzle-elite':['Andy Raconte','Les pirates Baby','Micro']
  };
  function cardKeyByNameOrKey(nameOrKey){
    const needle=String(nameOrKey||'').trim().toLowerCase();
    if(!needle)return null;
    const card=CATALOG.find(c=>String(c.key||'').toLowerCase()===needle)||CATALOG.find(c=>String(c.name||'').toLowerCase()===needle);
    return card?.key||null;
  }
  function manualPuzzleRewards(id,fallback){
    const chosen=(MANUAL_PUZZLE_REWARD_CHOICES[id]||[]).map(cardKeyByNameOrKey).filter(Boolean);
    const unique=[...new Set(chosen)];
    return unique.length===3 ? unique : fallback;
  }

  const PUZZLES=[
    {id:'puzzle-bronze',name:'LR',category:PLAYABLE_COLLECTION_NAMES[0]||'Base',minValue:10,rewardKeys:manualPuzzleRewards('puzzle-bronze', PACK_CATALOG.filter(c=>Number(c.points)>=18).slice(0,3).map(c=>c.key)),desc:'Donne 10 cartes valeur 10+ avec au moins 1 carte de la catégorie demandée.'},
    {id:'puzzle-rare',name:'SR',category:PLAYABLE_COLLECTION_NAMES[1]||PLAYABLE_COLLECTION_NAMES[0]||'Base',minValue:25,rewardKeys:manualPuzzleRewards('puzzle-rare', PACK_CATALOG.filter(c=>Number(c.points)>=35).slice(0,3).map(c=>c.key)),desc:'Donne 10 cartes valeur 25+ avec au moins 1 carte de la catégorie demandée.'},
    {id:'puzzle-elite',name:'SSR',category:PLAYABLE_COLLECTION_NAMES[2]||PLAYABLE_COLLECTION_NAMES[0]||'Base',minValue:50,rewardKeys:manualPuzzleRewards('puzzle-elite', PACK_CATALOG.filter(c=>Number(c.points)>=55).slice(0,3).map(c=>c.key)),desc:'Donne 10 cartes valeur 50+ avec au moins 1 carte de la catégorie demandée.'}
  ].filter(p=>p.rewardKeys.length);

  const oldDefaultStateModes=defaultState;
  defaultState=function(){const st=oldDefaultStateModes();return {...st,storyWins:[],lastDungeonAt:0,lastBattleRoyalAt:0,lastTournamentAt:0,completedPuzzles:[],puzzleSelected:{}};};
  function ensureModeFields(){if(!Array.isArray(state.storyWins))state.storyWins=[];if(!Array.isArray(state.completedPuzzles))state.completedPuzzles=[];if(!state.puzzleSelected||typeof state.puzzleSelected!=='object')state.puzzleSelected={};state.lastDungeonAt=Number(state.lastDungeonAt||0);state.lastBattleRoyalAt=Number(state.lastBattleRoyalAt||0);state.lastTournamentAt=Number(state.lastTournamentAt||0);if(!state.cardCooldowns||typeof state.cardCooldowns!=='object')state.cardCooldowns={};}
  function rem(last,cd){return Math.max(0,cd-(Date.now()-Number(last||0)));}
  function setRegen(k,ms){state.cardCooldowns[k]=Date.now()+ms;}
  function addPlus(n=1){state.plusOnes=Number(state.plusOnes||0)+n;}
  function addFlux(n=1,reason=''){state.popopipipapa=Number(state.popopipipapa||0)+n;if(reason)toast(`+${n} SKIBIDIFLUX · ${reason}`);}
  function shuf(a){return [...a].sort(()=>Math.random()-.5);}
  function rnd(a){return a[Math.floor(Math.random()*a.length)];}
  function alive(o){return Object.entries(o).find(([,u])=>u.hp>0);}
  function allDead(o){return Object.values(o||{}).every(u=>u.hp<=0);}
  function burnDead(units,ms=CARD_REGEN_MS){Object.entries(units||{}).forEach(([k,u])=>{if(u.hp<=0&&state.ownedCards[k])setRegen(k,ms);});}
  function unitFromKey(k,p=null){const c=getCard(k);const v=Math.max(1,Number(p??finalPoints(k)??c?.points??1));return{key:k,name:c?.name||'Carte',image:c?.image||'',hp:v,maxHp:v,atk:v};}

  function storyStageDesc(st){
    return STORY_STAGE_DESCRIPTIONS[st.lvl] || `Objectif : battre une équipe de valeur ${st.value}. ${st.rewardFlux?'Bonus : +1 SKIBIDIFLUX.':'Récompense : +1.'} ${st.lvl===50?'Jalon spécial : carte exclusive. ':''}${st.lvl===100?'Final : carte exclusive finale. ':''}`;
  }

  function storyStages(){return Array.from({length:100},(_,i)=>{const lvl=i+1,value=Math.round(20+(450-20)*(i/99));return{id:`story-${lvl}`,lvl,value,name:`Palier ${lvl}`,rewardFlux:lvl%3===0?1:0};});}
  function enemyTeamForValue(total){const pool=shuf(PACK_CATALOG).slice(0,5);let remaining=total;return Object.fromEntries(pool.map((c,i)=>{const p=i===pool.length-1?Math.max(1,remaining):Math.max(1,Math.round(total/5+(Math.random()*8-4)));remaining-=p;return[`enemy-${i}-${c.key}`,{key:c.key,name:c.name,image:c.image,hp:p,maxHp:p,atk:p}];}));}
  function startTeamModeBattle(mode,title,enemyValue,onWin,onLose){const keys=state.activeTeam.filter(k=>state.ownedCards[k]&&!isCardHealing(k)).slice(0,MAX_TEAM_SIZE);if(!keys.length){toast('Il faut au moins 1 carte prête dans ton équipe.');return;}currentBattle={mode,title,locked:false,lastFx:null,log:'Choisis une carte pour attaquer.',player:Object.fromEntries(keys.map(k=>[k,unitFromKey(k)])),enemy:enemyTeamForValue(enemyValue),onWin,onLose,enemyValue};renderGenericTeamFight();}
  function renderGenericTeamFight(){if(!currentBattle||!['storyFight','dungeonFight'].includes(currentBattle.mode))return;viewTitle.textContent=currentBattle.title;const cardBtn=(id,u,side)=>{const dead=u.hp<=0,hpPct=Math.max(0,Math.round(u.hp/u.maxHp*100)),attr=side==='player'?`data-generic-card="${id}" ${dead||currentBattle.locked?'disabled':''}`:'disabled';return`<button class="combat-card-btn ${dead?'dead':''}" ${attr}><div class="combat-card-img" style="background:${u.image?`url('${u.image}')`:fallbackBg(0)};background-size:cover;background-position:center top"></div><div class="combat-card-info"><div class="combat-card-name">${esc(u.name)}</div><div class="combat-card-stats">ATK ${u.atk} · PV ${Math.max(0,u.hp)}/${u.maxHp}</div><div class="hp-wrap"><div class="hp-fill" style="--hp:${hpPct}%"></div></div></div></button>`;};const fx=currentBattle.lastFx,fxHtml=fx?`<div class="attack-burst ${fx.side}" style="--scale:${attackScale(fx.damage)}"></div><div class="power-wave" style="--scale:${attackScale(fx.damage)};--x:${fx.side==='player'?'72%':'28%'};--y:${fx.side==='player'?'44%':'58%'}"></div>`:'';content.innerHTML=`<div class="battle-scene" style="--boss-glow:#00f0ff;--boss-accent:#f5c842">${fxHtml}<div class="battle-header"><h2 class="battle-boss-name">${esc(currentBattle.title)}</h2><p class="battle-score-line">Valeur adverse : <strong>${currentBattle.enemyValue}</strong></p></div><div class="team-vs-layout"><div class="team-vs-side"><div class="section-title">Ton équipe</div><div class="combat-card-list">${Object.entries(currentBattle.player).map(([k,u])=>cardBtn(k,u,'player')).join('')}</div></div><div class="team-vs-side enemy"><div class="section-title">Adversaires</div><div class="combat-card-list">${Object.entries(currentBattle.enemy).map(([k,u])=>cardBtn(k,u,'enemy')).join('')}</div></div></div><div class="combat-log">${currentBattle.log}</div></div>`;document.querySelectorAll('[data-generic-card]').forEach(b=>b.addEventListener('click',()=>genericAttack(b.dataset.genericCard)));renderSidebar();}
  function genericAttack(k){if(!currentBattle||currentBattle.locked)return;const p=currentBattle.player[k];if(!p||p.hp<=0)return;const ee=alive(currentBattle.enemy);if(!ee)return;const[,e]=ee;currentBattle.locked=true;e.hp-=p.atk;currentBattle.lastFx={side:'player',damage:p.atk};currentBattle.log=`${p.name} inflige ${p.atk} dégâts à ${e.name}.`;renderGenericTeamFight();setTimeout(()=>{if(!currentBattle)return;if(allDead(currentBattle.enemy)){const win=currentBattle.onWin;burnDead(currentBattle.player);currentBattle=null;win?.();return;}const at=alive(currentBattle.enemy)?.[1],te=alive(currentBattle.player);if(at&&te){const[,t]=te;t.hp-=at.atk;if(t.hp<0)t.hp=0;currentBattle.lastFx={side:'boss',damage:at.atk};currentBattle.log=`${at.name} riposte sur ${t.name} pour ${at.atk}.`;}currentBattle.locked=false;renderGenericTeamFight();setTimeout(()=>{if(!currentBattle)return;currentBattle.lastFx=null;if(allDead(currentBattle.player)){const lose=currentBattle.onLose;burnDead(currentBattle.player);currentBattle=null;lose?.();}else renderGenericTeamFight();},600);},700);}

  function renderStory(){ensureModeFields();currentView=STORY_VIEW;closeModal();cleanExpiredCooldowns();viewTitle.textContent='📖 Histoire';viewHint.textContent='Progression obligatoire : palier 1, puis 2, puis 3...';const wins=new Set(state.storyWins),stages=storyStages(),nextLvl=stages.find(st=>!wins.has(st.id))?.lvl||101;content.innerHTML=`<div class="hero-section" style="padding:22px 28px"><h2 class="hero-title" style="font-size:clamp(1.5rem,3vw,2.8rem)">Mode Histoire</h2><p style="color:var(--muted);font-size:.92rem;margin-top:6px">Chaque palier affiche maintenant son objectif. La progression est obligatoire : un palier verrouille tous les suivants tant qu'il n'est pas vaincu.</p><div class="team-summary-row"><span class="team-summary-pill">Victoires : <strong>${wins.size}/100</strong></span><span class="team-summary-pill">Prochain palier : <strong>${nextLvl<=100?nextLvl:'terminé'}</strong></span><span class="team-summary-pill">Jalons : <strong>50 et 100 = carte exclusive</strong></span></div></div><div class="boss-list">${stages.map(st=>{const done=wins.has(st.id),available=st.lvl===nextLvl,locked=!done&&!available,desc=storyStageDesc(st);return`<div class="boss-mini-card ${done?'done':available?'pass':'fail'}"><div class="boss-mini-name">${st.name}</div><div class="boss-mini-power">Équipe adverse : <strong>${st.value}</strong></div><div class="boss-mini-status">${done?'Vaincu ✅':locked?`🔒 Termine d'abord le palier ${nextLvl}`:`Disponible · ${desc}`}</div><p class="maze-info" style="margin:8px 0 10px">${desc}</p><button class="btn btn-primary btn-sm" data-story-stage="${st.lvl}" ${done||locked?'disabled':''}>${done?'Déjà battu':locked?'Verrouillé':'Combattre'}</button></div>`}).join('')}</div>`;document.querySelectorAll('[data-story-stage]').forEach(b=>b.addEventListener('click',()=>startStoryStage(Number(b.dataset.storyStage))));renderSidebar();}
  function startStoryStage(lvl){const stages=storyStages(),st=stages[lvl-1],next=stages.find(x=>!state.storyWins.includes(x.id))?.lvl||101;if(!st||state.storyWins.includes(st.id))return;if(lvl!==next){toast(`Termine d'abord le palier ${next}.`);return;}startTeamModeBattle('storyFight',`📖 ${st.name}`,st.value,()=>{ensureModeFields();if(!state.storyWins.includes(st.id))state.storyWins.push(st.id);addPlus(1);if(st.rewardFlux)addFlux(1,`Palier ${lvl}`);let reward='Tu gagnes +1.';if(lvl===50&&!state.ownedCards['story-exclusive-50']){addOwnedCard('story-exclusive-50');reward+=' Carte exclusive du palier 50 débloquée.';}if(lvl===100&&!state.ownedCards['story-exclusive-100']){addOwnedCard('story-exclusive-100');reward+=' Carte exclusive finale débloquée.';}saveState();renderSidebar();showModal('📖 Victoire histoire',`${st.name} terminé. ${reward}`,[{label:'Continuer',action:()=>{closeModal();renderStory();}}]);},()=>{saveState();renderSidebar();showModal('💀 Défaite histoire','Les cartes KO régénèrent pendant 1 minute.',[{label:'Retour Histoire',action:()=>{closeModal();renderStory();}}]);});}

      <div class="exchange-layout"><aside class="exchange-panel"><div class="section-title">Type d'échange</div><div class="exchange-mode-grid">${EXCHANGE_MODES_FINAL.map(m=>{const r=exchangeRemaining(m.id);return`<button class="exchange-mode-btn ${m.id===mode.id?'active':''}" data-exchange-mode-final="${m.id}">${esc(m.label)}${r?` · ${fmt(r)}`:''}</button>`}).join('')}</div><p class="maze-info">${esc(mode.desc)}</p><div class="section-title" style="margin-top:16px">Cartes données</div><div class="exchange-selected-list">${renderExchangeSelectedFinal()}</div><button class="btn btn-primary btn-full" id="confirmExchangeBtnFinal" ${EXCHANGE_STATE_FINAL.selected.length!==5||pool.length<1||remaining?'disabled':''}>${remaining?`Disponible dans ${fmt(remaining)}`:'Échanger 5 cartes'}</button><button class="btn btn-secondary btn-full" id="clearExchangeBtnFinal" ${EXCHANGE_STATE_FINAL.selected.length?'':'disabled'}>Vider la sélection</button></aside><section class="exchange-panel"><div class="section-title">Cartes disponibles pour cet échange</div><div class="exchange-grid">${cards||'<p class="no-team-hint">Aucune carte éligible pour ce mode.</p>'}</div></section></div>`;
    content.querySelectorAll('[data-exchange-mode-final]').forEach(btn=>btn.addEventListener('click',()=>{EXCHANGE_STATE_FINAL.mode=btn.dataset.exchangeModeFinal;EXCHANGE_STATE_FINAL.selected=[];renderExchangeFinal();}));
    content.querySelectorAll('[data-exchange-card-final]').forEach(btn=>btn.addEventListener('click',()=>toggleExchangeCardFinal(btn.dataset.exchangeCardFinal)));
    content.querySelectorAll('[data-exchange-remove-final]').forEach(btn=>btn.addEventListener('click',()=>{EXCHANGE_STATE_FINAL.selected.splice(Number(btn.dataset.exchangeRemoveFinal),1);renderExchangeFinal();}));
    document.getElementById('clearExchangeBtnFinal')?.addEventListener('click',()=>{EXCHANGE_STATE_FINAL.selected=[];renderExchangeFinal();});
    document.getElementById('confirmExchangeBtnFinal')?.addEventListener('click',confirmExchangeFinal);

  function confirmExchangeFinal(){

/* ─── PATCH COLLECTIONS MIXTES OBJETS + CARTES ─────────────────────────────
   Les collections sont désormais calculées depuis tout le CATALOG vivant.
   Donc les cartes ajoutées après le chargement initial (objets, modes, futures
   récompenses exclusives, etc.) apparaissent aussi dans l'écran Collection.
────────────────────────────────────────────────────────────────────────── */
(function(){
  const COLLECTION_REWARD_GROUP_NAME='Récompenses collection';
  const EXCLUDED_COLLECTION_GROUPS=new Set([COLLECTION_REWARD_GROUP_NAME,'Récompenses boss']);
  const DYNAMIC_COLLECTION_REWARD_DEFAULTS=[
    {
      id:9100,
      name:'Les pirates Prime',
      points:91,
      image:'picap/trio2.jpg',
      sourceCollection:'Upgrade Pirates',
      collectionReward:true,
      collections:[COLLECTION_REWARD_GROUP_NAME]
    },
	{
      id:9101,
      name:'Deb bouée Prime',
      points:94,
      image:'picap/deb3.png',
      sourceCollection:'Upgrade Deb',
      collectionReward:true,
      collections:[COLLECTION_REWARD_GROUP_NAME]
    },
	{
      id:9102,
      name:'Super Baguel en Iran Prime',
      points:92,
      image:'picap/sba2.png',
      sourceCollection:'Upgrade Super Baguel',
      collectionReward:true,
      collections:[COLLECTION_REWARD_GROUP_NAME]
    },
	{
      id:9103,
      name:'Raphael Prime',
      points:67,
      image:'picap/rap.jpg',
      sourceCollection:'Upgrade Raphael',
      collectionReward:true,
      collections:[COLLECTION_REWARD_GROUP_NAME]
    },
	{
      id:9104,
      name:'Boruto Prime',
      points:90,
      image:'picap/boru.jpg',
      sourceCollection:'Upgrade Boruto',
      collectionReward:true,
      collections:[COLLECTION_REWARD_GROUP_NAME]
    }
  ];

  function slugCollectionName(name){
    return String(name||'collection')
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-zA-Z0-9]+/g,'-')
      .replace(/^-+|-+$/g,'')
      .toLowerCase() || 'collection';
  }

  function isCollectionMemberCard(card){
    return !!card && !card.collectionReward && !card.sourceCollection && Array.isArray(card.collections);
  }

  function dynamicPlayableCollectionNames(){
    return [...new Set(
      CATALOG
        .filter(isCollectionMemberCard)
        .flatMap(card => card.collections || [])
        .filter(name => name && !EXCLUDED_COLLECTION_GROUPS.has(name))
    )].sort((a,b)=>a.localeCompare(b));
  }

  function ensureDynamicCollectionReward(raw, index=0){
    if(!raw || !raw.sourceCollection) return null;
    const existingBySource=CATALOG.find(card => card.collectionReward && card.sourceCollection===raw.sourceCollection);
    if(existingBySource) return existingBySource;
    const key=raw.key || `dyn-reward-${slugCollectionName(raw.sourceCollection)}-${raw.id ?? index}`;
    const existingByKey=CATALOG.find(card => card.key===key);
    if(existingByKey) return existingByKey;
    const card={
      ...raw,
      key,
      originalIndex:CATALOG.length,
      collectionReward:true,
      collections:Array.isArray(raw.collections) && raw.collections.length ? raw.collections : [COLLECTION_REWARD_GROUP_NAME]
    };
    CATALOG.push(card);
    return card;
  }

  const oldCollectionCards=typeof collectionCards==='function'?collectionCards:null;
  collectionCards=function(name){
    const live=CATALOG.filter(card => isCollectionMemberCard(card) && (card.collections||[]).includes(name));
    return live.length || !oldCollectionCards ? live : oldCollectionCards(name);
  };

  isCollectionComplete=function(name){
    const cards=collectionCards(name);
    return cards.length>0 && cards.every(card => hasSeenCard(card.key));
  };

  collectionRewardFor=function(name){
    const already=CATALOG.find(card => card.collectionReward && card.sourceCollection===name);
    if(already) return already;
    const staticReward=(Array.isArray(COLLECTION_REWARD_CARDS)?COLLECTION_REWARD_CARDS:[]).find(card => card.sourceCollection===name);
    if(staticReward) return ensureDynamicCollectionReward(staticReward, COLLECTION_REWARD_CARDS.indexOf(staticReward));
    const defaultReward=DYNAMIC_COLLECTION_REWARD_DEFAULTS.find(card => card.sourceCollection===name);
    if(defaultReward) return ensureDynamicCollectionReward(defaultReward, DYNAMIC_COLLECTION_REWARD_DEFAULTS.indexOf(defaultReward));
    return null;
  };

  checkCollectionUnlocks=function(){
    state.unlockedCollections=Array.isArray(state.unlockedCollections)?state.unlockedCollections:[];
    let unlocked=[];
    for(const name of dynamicPlayableCollectionNames()){
      if(state.unlockedCollections.includes(name)) continue;
      if(isCollectionComplete(name)){
        state.unlockedCollections.push(name);
        const reward=collectionRewardFor(name);
        if(reward && !state.ownedCards[reward.key]){
          state.ownedCards[reward.key]={key:reward.key,upgrade:0,duplicates:0};
        }
        unlocked.push(name);
      }
    }
    if(unlocked.length){
      saveState();
      toast(`🏆 Collection terminée : ${unlocked.join(', ')} · récompense débloquée !`);
    }
  };

  renderCollectionSets=function(){
    const names=dynamicPlayableCollectionNames();
    const sets=names.map(name=>{
      const cards=collectionCards(name);
      const owned=cards.filter(card=>hasSeenCard(card.key)).length;
      const total=cards.length||1;
      const pct=Math.round((owned/total)*100);
      const complete=owned===total;
      const reward=collectionRewardFor(name);
      const rewardText=reward
        ? (complete ? `Récompense débloquée : ${reward.name}` : `Récompense à débloquer : ${reward.name}`)
        : 'Aucune récompense configurée';
      const mini=cards.slice(0,12).map(card=>`<span class="collection-mini-dot ${hasSeenCard(card.key)?'owned':''} ${card?.hsVariant?'hs-variant':''}" title="${esc(card.name)}${hasSeenCard(card.key)?'':' · jamais obtenue'}" style="background:${imgBg(card,card.originalIndex)};background-size:cover;background-position:center top"></span>`).join('');
      const objectCount=cards.filter(card=>card.objectOnly).length;
      const normalCount=cards.length-objectCount;
      const typeText=objectCount && normalCount ? `${normalCount} carte${normalCount>1?'s':''} + ${objectCount} objet${objectCount>1?'s':''}` : objectCount ? `${objectCount} objet${objectCount>1?'s':''}` : `${normalCount} carte${normalCount>1?'s':''}`;
      return `<div class="collection-set-card ${complete?'complete':''}">
        <div class="collection-set-name">${complete?'✅':'📚'} ${esc(name)}</div>
        <div class="collection-set-meta">${owned}/${total} éléments · ${esc(typeText)} · ${esc(rewardText)}</div>
        <div class="collection-progress" style="--pct:${pct}%"><span></span></div>
        <div class="collection-mini-list">${mini}${cards.length>12?`<span class="collection-set-meta">+${cards.length-12}</span>`:''}</div>
      </div>`;
    }).join('');
    return `<div class="section-title" style="margin-top:22px">Collections</div><div class="collection-sets-grid">${sets}</div>`;
  };

  const oldRenderCollectionMixed=renderCollection;
  renderCollection=function(){
    checkCollectionUnlocks();
    return oldRenderCollectionMixed();
  };

  // Rend ces aides disponibles pour les futurs ajouts sans toucher au cœur du jeu.
  window.dynamicPlayableCollectionNames=dynamicPlayableCollectionNames;
  window.ensureDynamicCollectionReward=ensureDynamicCollectionReward;
})();
